<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景観規制_建物シミュレーター (モデリングモード)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-family: sans-serif;
            pointer-events: none;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            z-index: 10;
        }
        
        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 13px;
            pointer-events: none;
            white-space: pre-line; 
            z-index: 100;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        .lil-gui {
            --font-size: 14px;
            --input-font-size: 14px;
            --widget-height: 28px;
            --name-width: 40%;
            --folder-indent: 10px;
        }

        .tool-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .tool-btn {
            flex: 1; text-align: center; background: #3a3a3a; color: #ccc;
            padding: 8px 0; border-radius: 3px; cursor: pointer; font-size: 13px;
            font-weight: bold; border: 1px solid #222; user-select: none;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: #4a4a4a; color: #fff; }
        .tool-btn.active { background: #007acc; color: white; border-color: #005a9e; }

        .action-row { display: flex; gap: 5px; margin-top: 5px; }
        .action-btn {
            flex: 1; text-align: center; background: #555; color: white;
            padding: 6px 0; border-radius: 3px; cursor: pointer; font-size: 13px;
            user-select: none;
        }
        .action-btn:hover { background: #666; }
        .action-btn:active { background: #444; }
        .action-btn.disabled { opacity: 0.3; pointer-events: none; }

        #status-panel {
            position: absolute;
            bottom: 20px; /* ★上(top)から下(bottom)に変更 */
            left: 50%;    /* ★中央寄せ */
            transform: translateX(-50%); /* ★中央寄せのための調整 */
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #d9534f;
            z-index: 10;
            pointer-events: none;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: #d9534f;
            line-height: 1.5;
            text-align: center;  /* ★テキストを中央揃えに */
            white-space: nowrap; /* ★文字が縦に改行されるのを防ぐ */
        }

        #floating-menu {
            position: absolute;
            display: none; /* 初期は非表示 */
            flex-direction: column;
            gap: 5px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
            z-index: 200;
        }

        .float-btn {
            background: #007acc; color: white; border: none;
            padding: 8px 12px; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: bold; text-align: center;
            user-select: none;
        }
        .float-btn:hover { background: #005a9e; }
        .float-btn.danger { background: #d9534f; }
        .float-btn.danger:hover { background: #c9302c; }
        /* 既存の .float-btn 類に追加・修正 */
        .float-btn.warning { background: #f0ad4e; color: white; } /* 黄色：変更用 */
        .float-btn.warning:hover { background: #ec971f; }
        .float-btn.black { background: #000000; color: #ffffff; } /* 黒色：プッシュプル用 */
        .float-btn.black:hover { background: #333333; }

    #main-toolbar {
        position: absolute;
        bottom: 75px; /* ★ステータスパネルの上に乗るように 30px から 75px に変更 */
        left: 50%;
        transform: translateX(-50%); /* 中央寄せ */
        background: rgba(255, 255, 255, 0.95);
        padding: 8px 12px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        display: flex;
        gap: 8px;
        z-index: 100;
        border: 1px solid #ccc;
        align-items: center;
    }

    .toolbar-btn {
        background: #f8f9fa;
        color: #333;
        border: 1px solid #ccc;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: all 0.2s ease;
        user-select: none;
    }

    .toolbar-btn:hover { background: #e2e6ea; }
    .toolbar-btn.active { background: #007acc; color: white; border-color: #005a9e; }
    .toolbar-btn.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .toolbar-btn.danger { background: #fff; color: #d9534f; }
    .toolbar-btn.danger:hover { background: #d9534f; color: white; border-color: #d9534f; }

    .toolbar-divider { width: 1px; height: 24px; background: #ccc; margin: 0 4px; }

    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
        }
      }
    </script>
</head>
<body>
    <div id="info">
    <strong id="mode-text" style="color: #005a9e;">【選択・視点移動】</strong><br>
    <span id="mode-desc">左クリック: 物体を選択 (Deleteで削除) / 左ドラッグ: 回転 / 右ドラッグ: 平行移動</span>
    </div>

    <div id="main-toolbar">
        <button id="btn-draw" class="toolbar-btn" onclick="window.clickTool('DRAW')">
            ＋ 平面作図
        </button>
        <!-- プッシュプルボタンは面選択メニューに移動したため削除 -->
        
        <div class="toolbar-divider"></div>
        
        <button id="btn-undo" class="toolbar-btn disabled" onclick="undo()">↺ 戻る</button>
        <button id="btn-redo" class="toolbar-btn disabled" onclick="redo()">↻ 進む</button>
        <button id="btn-clear" class="toolbar-btn danger" onclick="clearAll()">✖ 全消去</button>
    </div>

    <div id="status-panel">
        <span id="status-text">▶ オブジェクトを選択するか、ツールを選んでください</span>
    </div>

    <div id="floating-menu"></div>
    
    <div id="tooltip"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import GUI from 'lil-gui'; // ★新規追加：lil-gui のインポート

        // --- GUI管理用のグローバル変数 ---
        let currentGUI = null;

        // --- 基本セットアップ ---
        const width = window.innerWidth;
        const height = window.innerHeight;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);

        const camera = new THREE.PerspectiveCamera(45, width / height, 100, 50000);
        camera.position.set(12000, 10000, 15000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.update(); 

        const gridHelper = new THREE.GridHelper(20000, 40, 0xcccccc, 0xe0e0e0);
        gridHelper.position.y = -1; 
        scene.add(gridHelper);

        const wallMat = new THREE.MeshBasicMaterial({ 
            color: 0xe8e8e8, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); 
        const activeMat = new THREE.MeshBasicMaterial({ 
            color: 0xcceeff, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); 
        const selectedMat = new THREE.MeshBasicMaterial({ 
            color: 0xffaaaa, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); 
        const roofMat = new THREE.MeshBasicMaterial({ 
            color: 0x555555, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        });
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

        // ★ 新規追加：バルコニー用のマテリアル
        const balcWallMat = new THREE.MeshBasicMaterial({ 
            color: 0x999999, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // 少し濃い灰色（床と側壁用）
        const balcGlassMat = new THREE.MeshBasicMaterial({ 
            color: 0x88ccff, transparent: true, opacity: 0.5, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // 水色の透過50%（前面の手すり壁用）
        // つけ柱用の木材風マテリアル（濃い茶色）
        const woodMat = new THREE.MeshBasicMaterial({ 
            color: 0x4a2e1b, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        });
        // ★新規追加：窓用のマテリアル
        const sashMat = new THREE.MeshBasicMaterial({ 
            color: 0x444444, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // 窓枠（ダークグレー）
        // ★新規追加：ガラスの反射（空と地面）を表現する疑似テクスチャを生成する関数（超軽量）
        const createGlassTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 2;    // グラデーションだけなので極小サイズでOK
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 256);
            grad.addColorStop(0, '#8ab8e6');   // 上部：空の明るい水色
            grad.addColorStop(0.5, '#d4e8fc'); // 中央：光の反射（白っぽい水色）
            grad.addColorStop(1, '#5c8fbf');   // 下部：少し落ち着いた青色
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 2, 256);
            return new THREE.CanvasTexture(canvas);
        };
        // ★修正：単色ではなく、生成したグラデーションテクスチャを割り当てる
        const windowGlassMat = new THREE.MeshBasicMaterial({ 
            map: createGlassTexture(), // テクスチャを指定
            color: 0xffffff,           // テクスチャの色をそのまま活かすため白にする
            transparent: true, 
            opacity: 0.85,             // 程よい透過性に設定
            polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // 窓ガラス（光沢感のある水色）
        
        // ★新規追加：玄関扉とポーチのマテリアル
        const doorMat = new THREE.MeshBasicMaterial({ 
            color: 0x4a3b32, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // 玄関扉（少し濃いウォールナット調の木目色）
        const porchMat = new THREE.MeshBasicMaterial({ 
            color: 0xbbbbbb, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1, side: THREE.DoubleSide 
        }); // ポーチ（モルタル・タイル調の明るいグレー）

        const hoverMat = new THREE.MeshBasicMaterial({ 
            color: 0xffaa00, transparent: true, opacity: 0.6, side: THREE.DoubleSide 
        });
        const hoverMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), hoverMat);
        hoverMesh.visible = false;
        scene.add(hoverMesh);

        const houseGroup = new THREE.Group();
        scene.add(houseGroup);

        const tooltip = document.getElementById('tooltip');

        // --- 状態管理 ---
        let currentTool = null; 
        let buildingData = []; 
        let interactiveMeshes = []; 
        let meshMap = {}; 
        let selectedId = null;
        let selectedFaceDir = null;
        let waitingForVisorBlockId = null; 

        let lastMenuX = 0;
        let lastMenuY = 0;

        let btnUndo = null, btnRedo = null;
        const MAX_HISTORY = 3;
        let history = [];
        let historyIndex = -1;

        function updateActionButtons() {
            const undoBtn = document.getElementById('btn-undo');
            const redoBtn = document.getElementById('btn-redo');
            if (!undoBtn || !redoBtn) return; 

            if (historyIndex > 0) undoBtn.classList.remove('disabled');
            else undoBtn.classList.add('disabled');

            if (historyIndex < history.length - 1) redoBtn.classList.remove('disabled');
            else redoBtn.classList.add('disabled');
        }

        function saveState() {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(JSON.stringify(buildingData));
            if (history.length > MAX_HISTORY + 1) history.shift();
            else historyIndex++;
            updateActionButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                buildingData = JSON.parse(history[historyIndex]);
                selectedId = null; 
                rebuildMeshes();
                updateActionButtons();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                buildingData = JSON.parse(history[historyIndex]);
                selectedId = null;
                rebuildMeshes();
                updateActionButtons();
            }
        }

        function isTopClear(b) {
            for (let ob of buildingData) {
                if (ob.id === b.id) continue;
                const obBottom = ob.y || 0;
                const obTop = obBottom + ob.h;
                const bTop = (b.y || 0) + b.h;
                
                if (obBottom <= bTop + 1 && obTop >= bTop - 1) {
                    const overlapX = Math.abs(ob.x - b.x) * 2 < (ob.w + b.w) - 1;
                    const overlapZ = Math.abs(ob.z - b.z) * 2 < (ob.d + b.d) - 1;
                    if (overlapX && overlapZ) return false;
                }
            }
            return true;
        }

        function getStackedBlocks(baseBlocks) {
            let result = [...baseBlocks];
            let added = true;
            while(added) {
                added = false;
                buildingData.forEach(ob => {
                    if (!result.find(r => r.id === ob.id)) {
                        for(let b of result) {
                            const bTop = (b.y || 0) + b.h;
                            const obBottom = ob.y || 0;
                            if (Math.abs(obBottom - bTop) < 1) { 
                                const overlapX = Math.abs(ob.x - b.x) * 2 < (ob.w + b.w) - 1;
                                const overlapZ = Math.abs(ob.z - b.z) * 2 < (ob.d + b.d) - 1;
                                if (overlapX && overlapZ) {
                                    result.push(ob);
                                    added = true;
                                    break;
                                }
                            }
                        }
                    }
                });
            }
            return result;
        }

        function updateAllLowerRoofs() {
            buildingData.forEach(b => {
                if (b.lowerRoof) { // ★skirtRoof を lowerRoof に変更
                    let upperB = null;
                    for (let ob of buildingData) {
                        if (ob.id === b.id) continue;
                        const obBottom = ob.y || 0;
                        const lowerTop = (b.y || 0) + b.h;
                        if (Math.abs(obBottom - lowerTop) < 1) {
                            const overlapX = Math.abs(ob.x - b.x) * 2 < (ob.w + b.w) - 1;
                            const overlapZ = Math.abs(ob.z - b.z) * 2 < (ob.d + b.d) - 1;
                            if (overlapX && overlapZ) { upperB = ob; break; }
                        }
                    }
                    if (upperB) {
                        const L1 = b.x - b.w/2; const R1 = b.x + b.w/2;
                        const B1 = b.z - b.d/2; const F1 = b.z + b.d/2;
                        const L2 = upperB.x - upperB.w/2; const R2 = upperB.x + upperB.w/2;
                        const B2 = upperB.z - upperB.d/2; const F2 = upperB.z + upperB.d/2;
                        // ★skirtRoof を lowerRoof に変更
                        b.lowerRoof.out_nx = Math.max(0, L2 - L1);
                        b.lowerRoof.out_px = Math.max(0, R1 - R2);
                        b.lowerRoof.out_nz = Math.max(0, B2 - B1);
                        b.lowerRoof.out_pz = Math.max(0, F1 - F2);
                    }
                }
            });
        }

        // ★ 新規追加：各種屋根のデフォルトパラメータを定義
        const defaultRoofParams = {
            '切妻': { eaves: 600, keraba: 300, slope: 4, rotate90: false },
            '寄棟': { eaves: 600, keraba: 600, slope: 4 }, // 寄棟はケラバ＝軒の出として扱う
            'パラペット修景': { pHeight: 300, slope: 3, out_px: 600, in_px: 400 }, // 外方向/内方向
            '陸屋根': { pHeight: 300 }
        };

        window.addRoof = function(type) {
            if (!selectedId) return alert('まず大屋根を乗せたいブロックをクリックして選択してください。');
            const b = buildingData.find(d => d.id === selectedId);
            if (!isTopClear(b)) return alert('上に別のブロックが乗っているため、大屋根は配置できません。');
            
            // ★修正：初期化時にすべての屋根の設定を記憶するオブジェクト(params)を持たせる
            b.roof = {
                type: type, // 現在の表示タイプ
                params: JSON.parse(JSON.stringify(defaultRoofParams)) // デフォルト値のディープコピー
            };
            
            saveState();
            rebuildMeshes();
            updateGUI(b, 'roof');
        };

        window.toggleRoof = function() {
            if (!selectedId) return;
            const b = buildingData.find(d => d.id === selectedId);
            if (!isTopClear(b)) return alert('上に別のブロックが乗っているため、大屋根は配置できません。');

            if (!b.roof) {
                b.roof = { type: '切妻', params: JSON.parse(JSON.stringify(defaultRoofParams)) };
            } else if (b.roof.type === '切妻' && !b.roof.params['切妻'].rotate90) {
                b.roof.params['切妻'].rotate90 = true;
            } else if (b.roof.type === '切妻' && b.roof.params['切妻'].rotate90) {
                b.roof.type = '寄棟';
            } else if (b.roof.type === '寄棟') {
                b.roof.type = 'パラペット修景'; // ★名称変更
            } else if (b.roof.type === 'パラペット修景') { // ★名称変更
                b.roof.type = '陸屋根';
            } else {
                // 陸屋根 -> 削除
                delete b.roof;
                clearGUI();
            }

            saveState();
            rebuildMeshes();
            showFloatingMenu(lastMenuX, lastMenuY, b, 'top', null);
            updateGUI(b, 'roof');
        };

// ==========================================
        // ★ 新規追加：パラメータ調整用GUIの制御
        // ==========================================
        function clearGUI() {
            if (currentGUI) {
                currentGUI.destroy();
                currentGUI = null;
            }
        }

        function updateGUI(b, targetType = 'roof', faceDir = null) {
            clearGUI(); // 既存のGUIがあれば破棄
            if (!b) return; 

            // ==========================================
            // 大屋根（パラペット修景含む）のGUI設定
            // ==========================================
            if (targetType === 'roof') {
                if (!b.roof) return;
                currentGUI = new GUI({ title: '大屋根の寸法設定' });
                currentGUI.domElement.style.position = 'absolute';
                currentGUI.domElement.style.top = '10px';
                currentGUI.domElement.style.right = '10px';

                const type = b.roof.type;
                const params = b.roof.params[type];
                const onChange = () => rebuildMeshes();
                const onFinishChange = () => saveState();

                const resetObj = {
                    reset: () => {
                        const currentRot = (type === '切妻') ? b.roof.params['切妻'].rotate90 : false;
                        b.roof.params[type] = JSON.parse(JSON.stringify(defaultRoofParams[type]));
                        if (type === '切妻') b.roof.params['切妻'].rotate90 = currentRot;
                        saveState();
                        rebuildMeshes();
                        updateGUI(b, 'roof'); 
                    }
                };

                if (type === '切妻') {
                    currentGUI.add(params, 'eaves', 0, 2000, 100).name('軒の出 (mm)').onChange(onChange).onFinishChange(onFinishChange);
                    currentGUI.add(params, 'keraba', 0, 2000, 100).name('ケラバ (mm)').onChange(onChange).onFinishChange(onFinishChange);
                    currentGUI.add(params, 'slope', 0, 10, 0.5).name('屋根勾配 (寸)').onChange(onChange).onFinishChange(onFinishChange);
                } else if (type === '寄棟') {
                    currentGUI.add(params, 'eaves', 0, 2000, 100).name('軒の出 (mm)').onChange(onChange).onFinishChange(onFinishChange);
                    currentGUI.add(params, 'slope', 0, 10, 0.5).name('屋根勾配 (寸)').onChange(onChange).onFinishChange(onFinishChange);
                } else if (type === 'パラペット修景') {
                    currentGUI.add(params, 'pHeight', 150, 1000, 50).name('パラペット高さ (mm)').onChange(onChange).onFinishChange(onFinishChange);
                    currentGUI.add(params, 'slope', 0, 10, 0.5).name('笠木勾配 (寸)').onChange(onChange).onFinishChange(onFinishChange);
                    currentGUI.add(params, 'out_px', 0, 2000, 100).name('外方向の出幅 (mm)').onChange(onChange).onFinishChange(onFinishChange);
                    const maxIn = Math.floor(Math.min(b.w / 2, b.d / 2) / 50) * 50; 
                    if (params.in_px > maxIn) params.in_px = maxIn;
                    currentGUI.add(params, 'in_px', 0, maxIn, 50).name('内方向の寸法 (mm)').onChange(onChange).onFinishChange(onFinishChange);
                } else if (type === '陸屋根') {
                    currentGUI.add(params, 'pHeight', 150, 1000, 50).name('パラペット高さ (mm)').onChange(onChange).onFinishChange(onFinishChange);
                }
                currentGUI.add(resetObj, 'reset').name('↺ デフォルトに戻す');
            }
            // ==========================================
            // 下屋のGUI設定
            // ==========================================
            else if (targetType === 'lowerRoof') {
                if (!b.lowerRoof) return;
                currentGUI = new GUI({ title: '下屋の寸法設定' });
                currentGUI.domElement.style.position = 'absolute';
                currentGUI.domElement.style.top = '10px';
                currentGUI.domElement.style.right = '10px';

                const lr = b.lowerRoof;
                const onChange = () => rebuildMeshes();
                const onFinishChange = () => saveState();

                const resetObj = {
                    reset: () => {
                        b.lowerRoof.eaves = 600;
                        b.lowerRoof.keraba = 300;
                        b.lowerRoof.slope = 4;
                        saveState();
                        rebuildMeshes();
                        updateGUI(b, 'lowerRoof'); 
                    }
                };

                currentGUI.add(lr, 'eaves', 0, 1000, 100).name('軒の出 (mm)').onChange(onChange).onFinishChange(onFinishChange);

        // ★ 新規追加・統合：庇のサイクルトグル（パラメータ初期化を追加）
        window.cycleVisor = function(dir) {
            if (!selectedId) return;
            const b = buildingData.find(d => d.id === selectedId);
            
            if (!b.visors) b.visors = [];
            if (!b.flatVisors) b.flatVisors = [];
            if (!b.visorParams) b.visorParams = {};
            if (!b.flatVisorParams) b.flatVisorParams = {};

            const vIdx = b.visors.indexOf(dir);
            const fIdx = b.flatVisors.indexOf(dir);

            if (vIdx === -1 && fIdx === -1) {
                // なし -> 軒庇
                b.visors.push(dir);
                b.visorParams[dir] = { eaves: 600, keraba: 300, slope: 4 }; // デフォルト値
            } else if (vIdx > -1) {
                // 軒庇 -> 水平庇
                b.visors.splice(vIdx, 1);
                delete b.visorParams[dir];
                b.flatVisors.push(dir);
                b.flatVisorParams[dir] = { depth: 300, offsetY: 0, margin: 0 }; // デフォルト値
            } else if (fIdx > -1) {
                // 水平庇 -> なし
                b.flatVisors.splice(fIdx, 1);
                delete b.flatVisorParams[dir];
            }

            if (b.visors.length === 0) delete b.visors;
            if (b.flatVisors.length === 0) delete b.flatVisors;
            if (Object.keys(b.visorParams).length === 0) delete b.visorParams;
            if (Object.keys(b.flatVisorParams).length === 0) delete b.flatVisorParams;

            saveState();
            rebuildMeshes();
            showFloatingMenu(lastMenuX, lastMenuY, b, 'side', dir);
            
            // ★ ここでGUIを更新
            if ((b.visors && b.visors.includes(dir)) || (b.flatVisors && b.flatVisors.includes(dir))) {
                updateGUI(b, 'side', dir);
            } else {
                clearGUI(); // 「なし」になった場合はGUIを消す
            }
        };

            }
        };

        function rebuildMeshes() {
            while(houseGroup.children.length > 0){ 
                const child = houseGroup.children[0];
                houseGroup.remove(child); 
                if(child.geometry) child.geometry.dispose();
            }
            meshMap = {};
            interactiveMeshes = [];

            buildingData.forEach(b => {
                const geo = new THREE.BoxGeometry(b.w, b.h, b.d);
                
                // ★修正: オブジェクト全体ではなく、選択された「1面のみ」を赤く(selectedMat)する
                const mats = [wallMat, wallMat, wallMat, wallMat, wallMat, wallMat];
                if (b.id === selectedId && selectedFaceDir) {
                    const fmap = { 'px':0, 'nx':1, 'top':2, 'bottom':3, 'pz':4, 'nz':5 };
                    const idx = fmap[selectedFaceDir];
                    if (idx !== undefined) mats[idx] = selectedMat;
                }
                
                const mesh = new THREE.Mesh(geo, mats);
                
                const baseY = b.y || 0;
                mesh.position.set(b.x, baseY + b.h / 2, b.z);
                mesh.userData.id = b.id; 

                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, edgeMat);
                line.position.copy(mesh.position);

                houseGroup.add(mesh, line);
                interactiveMeshes.push(mesh); 
                meshMap[b.id] = { mesh, line };

                // ★追加：1階（baseY === 0）の場合、下から100mmの位置に基礎（犬走り）の横線を引く
                if (baseY === 0 && b.h > 100) {
                    const kisoY = 100;
                    const pts = [
                        new THREE.Vector3(-b.w/2, kisoY, b.d/2),
                        new THREE.Vector3(b.w/2, kisoY, b.d/2),
                        new THREE.Vector3(b.w/2, kisoY, -b.d/2),
                        new THREE.Vector3(-b.w/2, kisoY, -b.d/2),
                        new THREE.Vector3(-b.w/2, kisoY, b.d/2) // 一周して閉じる
                    ];
                    const kisoGeo = new THREE.BufferGeometry().setFromPoints(pts);
                    const kisoLine = new THREE.Line(kisoGeo, edgeMat);
                    // 配置位置：基準はブロックの中心(b.x, b.z)と底面(baseY)
                    kisoLine.position.set(b.x, baseY, b.z);
                    kisoLine.userData = { id: b.id }; // ★この1行を追加
                    houseGroup.add(kisoLine);
                }

                // --- 大屋根の生成 ---
                if (b.roof) {
                    const roofGroup = new THREE.Group();
                    roofGroup.position.set(b.x, baseY + b.h, b.z); 
                    
                    const w = b.w; const d = b.d; 
                    const t = 150; // 厚みは固定150で問題なし

                    // ★ 新データ構造からパラメータを取得
                    const rParams = b.roof.params[b.roof.type];
                    // 勾配(寸)を0〜1の割合に変換 (例: 4寸 -> 0.4)
                    const slope = (rParams.slope !== undefined) ? rParams.slope / 10 : 0.4;
                    
                    let e_px = 0, e_nx = 0, e_pz = 0, e_nz = 0;

                    if (b.roof.type === '切妻') {
                        if (rParams.rotate90) {
                            e_px = rParams.keraba; e_nx = rParams.keraba;
                            e_pz = rParams.eaves;  e_nz = rParams.eaves;
                        } else {
                            e_px = rParams.eaves;  e_nx = rParams.eaves;
                            e_pz = rParams.keraba; e_nz = rParams.keraba;
                        }
                    } else if (b.roof.type === '寄棟') {
                        // 寄棟は軒の出(eaves)を全方向に適用する
                        e_px = rParams.eaves; e_nx = rParams.eaves;
                        e_pz = rParams.eaves; e_nz = rParams.eaves;
                    }

                    buildingData.forEach(ob => {
                        if (ob.id === b.id) return;
                        if ((ob.y || 0) + ob.h > (b.y || 0) + b.h - 50) {
                            if (Math.max((b.z) - b.d/2, (ob.z) - ob.d/2) < Math.min((b.z) + b.d/2, (ob.z) + ob.d/2) - 1) {
                                if (ob.x > b.x) {
                                    let gap = (ob.x - ob.w/2) - (b.x + b.w/2);
                                    if (gap >= -10 && gap < e_px) e_px = Math.max(0, gap);
                                }
                                if (ob.x < b.x) {
                                    let gap = (b.x - b.w/2) - (ob.x + ob.w/2);
                                    if (gap >= -10 && gap < e_nx) e_nx = Math.max(0, gap);
                                }
                            }
                            if (Math.max((b.x) - b.w/2, (ob.x) - ob.w/2) < Math.min((b.x) + b.w/2, (ob.x) + ob.w/2) - 1) {
                                if (ob.z > b.z) {
                                    let gap = (ob.z - ob.d/2) - (b.z + b.d/2);
                                    if (gap >= -10 && gap < e_pz) e_pz = Math.max(0, gap);
                                }
                                if (ob.z < b.z) {
                                    let gap = (b.z - b.d/2) - (ob.z + ob.d/2);
                                    if (gap >= -10 && gap < e_nz) e_nz = Math.max(0, gap);
                                }
                            }
                        }
                    });

                    if (b.roof.type === '寄棟') {
                        let e_all = Math.min(e_px, e_nx, e_pz, e_nz);
                        e_px = e_all; e_nx = e_all; e_pz = e_all; e_nz = e_all;
                    }

                    // --- パラペット修景 / 陸屋根 の描画処理 ---
                    if (b.roof.type === 'パラペット修景' || b.roof.type === '陸屋根') {
                        const pThick = 150; 
                        const pHeight = rParams.pHeight;// ★ スライダーの値を使用
                        
                        // 1. パラペット壁の生成 (共通)
                        const outerShape = new THREE.Shape();
                        outerShape.moveTo(-w/2, -d/2);
                        outerShape.lineTo(w/2, -d/2);
                        outerShape.lineTo(w/2, d/2);
                        outerShape.lineTo(-w/2, d/2);
                        outerShape.lineTo(-w/2, -d/2);
                        
                        const innerHole = new THREE.Path();
                        innerHole.moveTo(-w/2 + pThick, -d/2 + pThick);
                        innerHole.lineTo(-w/2 + pThick, d/2 - pThick);
                        innerHole.lineTo(w/2 - pThick, d/2 - pThick);
                        innerHole.lineTo(w/2 - pThick, -d/2 + pThick);
                        innerHole.lineTo(-w/2 + pThick, -d/2 + pThick);
                        
                        outerShape.holes.push(innerHole);
                        
                        const pGeo = new THREE.ExtrudeGeometry(outerShape, { depth: pHeight, bevelEnabled: false });
                        pGeo.rotateX(-Math.PI / 2);
                        
                        // 壁には壁用（選択時は赤色）のマテリアルを適用
                        const pMat = wallMat;
                        const pMesh = new THREE.Mesh(pGeo, pMat);
                        const pLine = new THREE.LineSegments(new THREE.EdgesGeometry(pGeo), edgeMat);
                        roofGroup.add(pMesh, pLine);

                        // 2. 上部の笠木屋根 (「パラペット修景」の場合のみ生成)
                        if (b.roof.type === 'パラペット修景') {
                            const e_out = rParams.out_px; // ★ スライダーの値を使用
                            const e_in_target = rParams.in_px; // ★ スライダーの値を使用
                            // GUI側でも制限していますが、描画側でも安全のため上限をクリップします
                            const max_in = Math.min(e_in_target, w/2, d/2); 
                            
                            const rSlope = rParams.slope / 10; // ★ スライダーの値(寸)を使用
                            const rThick = 150; 

                            const y_OB = pHeight - e_out * rSlope;  
                            const y_OT = y_OB + rThick;            
                            const y_IB = pHeight + max_in * rSlope; 
                            const y_IT = y_IB + rThick;            

                            const x_out = w/2 + e_out;
                            const z_out = d/2 + e_out;
                            const x_in = w/2 - max_in;
                            const z_in = d/2 - max_in;

                            const pts = [
                                [x_out, y_OT, z_out], [x_out, y_OB, z_out], [x_in, y_IT, z_in], [x_in, y_IB, z_in],       
                                [-x_out, y_OT, z_out], [-x_out, y_OB, z_out], [-x_in, y_IT, z_in], [-x_in, y_IB, z_in],   
                                [-x_out, y_OT, -z_out], [-x_out, y_OB, -z_out], [-x_in, y_IT, -z_in], [-x_in, y_IB, -z_in], 
                                [x_out, y_OT, -z_out], [x_out, y_OB, -z_out], [x_in, y_IT, -z_in], [x_in, y_IB, -z_in]    
                            ];

                            const rVerts = [];
                            const rInds = [];
                            let vIdx = 0;

                            const addQuad = (p0, p1, p2, p3) => {
                                rVerts.push(...p0, ...p1, ...p2, ...p3);
                                rInds.push(vIdx, vIdx+1, vIdx+2, vIdx, vIdx+2, vIdx+3);
                                vIdx += 4;
                            };

                            for (let i = 0; i < 4; i++) {
                                const next = (i + 1) % 4;
                                const i0 = i * 4;
                                const n0 = next * 4;

                                const pOT = pts[i0 + 0], pOB = pts[i0 + 1], pIT = pts[i0 + 2], pIB = pts[i0 + 3];
                                const nOT = pts[n0 + 0], nOB = pts[n0 + 1], nIT = pts[n0 + 2], nIB = pts[n0 + 3];

                                addQuad(pOT, nOT, nIT, pIT); 
                                addQuad(pOB, pIB, nIB, nOB); 
                                addQuad(pOB, pOT, nOT, nOB); 
                                addQuad(pIB, nIB, nIT, pIT); 
                            }

                            const rGeo = new THREE.BufferGeometry();
                            rGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(rVerts), 3));
                            rGeo.setIndex(rInds);
                            rGeo.computeVertexNormals();

                            const rMesh = new THREE.Mesh(rGeo, roofMat);
                            const rLine = new THREE.LineSegments(new THREE.EdgesGeometry(rGeo), edgeMat);
                            roofGroup.add(rMesh, rLine);
                        }

                    } else if (b.roof.type === '切妻') {
                        const isRot = rParams.rotate90; // ★修正
                        const profW = isRot ? d : w; 
                        const extD  = isRot ? w : d; 
                        
                        let e_L, e_R, drop_L, drop_R;
                        if (isRot) {
                            // 90度回転時は Y軸で回転するため、Z軸とX軸の対応が入れ替わります
                            e_L = e_pz; // 手前(+Z)が左側にくる
                            e_R = e_nz; // 奥(-Z)が右側にくる
                        } else {
                            e_L = e_nx; 
                            e_R = e_px; 
                        }
                        
                        const ridgeH = (profW / 2) * slope;
                        const drop_L_val = e_L * slope;
                        const drop_R_val = e_R * slope;

                        // 妻壁（三角形）の形状
                        const gShape = new THREE.Shape();
                        gShape.moveTo(-profW/2, 0); gShape.lineTo(profW/2, 0);
                        gShape.lineTo(0, ridgeH); gShape.lineTo(-profW/2, 0);
                        const gGeo = new THREE.ExtrudeGeometry(gShape, { depth: extD, bevelEnabled: false });

                        // 屋根面（スラブ）の形状
                        const rShape = new THREE.Shape();
                        rShape.moveTo(-profW/2 - e_L, -drop_L_val + t);
                        rShape.lineTo(0, ridgeH + t);
                        rShape.lineTo(profW/2 + e_R, -drop_R_val + t);
                        rShape.lineTo(profW/2 + e_R, -drop_R_val);
                        rShape.lineTo(0, ridgeH);
                        rShape.lineTo(-profW/2 - e_L, -drop_L_val);
                        rShape.lineTo(-profW/2 - e_L, -drop_L_val + t);
                        
                        const roofD = isRot ? extD + e_nx + e_px : extD + e_nz + e_pz;
                        const rGeo = new THREE.ExtrudeGeometry(rShape, { depth: roofD, bevelEnabled: false });

                        // ジオメトリのオフセットと回転
                        if (isRot) {
                            gGeo.translate(0, 0, -extD/2);
                            rGeo.translate(0, 0, -(extD/2 + e_nx));
                            // ★ ジオメトリの頂点自体を回転させることで確実に描画へ反映
                            gGeo.rotateY(Math.PI / 2);
                            rGeo.rotateY(Math.PI / 2);
                        } else {
                            gGeo.translate(0, 0, -extD/2);
                            rGeo.translate(0, 0, -(extD/2 + e_nz));
                        }
                        
                        const gMat = wallMat;
                        const gMesh = new THREE.Mesh(gGeo, gMat);
                        const gLine = new THREE.LineSegments(new THREE.EdgesGeometry(gGeo), edgeMat);
                        roofGroup.add(gMesh, gLine);
                        
                        const rMesh = new THREE.Mesh(rGeo, roofMat);
                        const rLine = new THREE.LineSegments(new THREE.EdgesGeometry(rGeo), edgeMat);
                        roofGroup.add(rMesh, rLine);

                    } else {
                        let ridge_axis = w <= d ? 'Z' : 'X';
                        let H_ridge_rel = (ridge_axis === 'Z') ? (w / 2) * slope : (d / 2) * slope;
                        let drop = e_px * slope; 
                        
                        const ry_top = H_ridge_rel + t;
                        const ey_top = -drop + t;
                        const ey_bot = -drop;
                        const ry_bot = H_ridge_rel;
                        
                        const ex = w / 2 + e_px;
                        const ez = d / 2 + e_px;
                        
                        let rZ = 0, rX = 0;
                        if (ridge_axis === 'Z') { rZ = (d - w) / 2; } else { rX = (w - d) / 2; }
                        
                        const p_1 = (ridge_axis === 'Z') ? [0, ry_top, rZ] : [rX, ry_top, 0];
                        const p_2 = (ridge_axis === 'Z') ? [0, ry_top, -rZ] : [-rX, ry_top, 0];
                        const pb_1 = (ridge_axis === 'Z') ? [0, ry_bot, rZ] : [rX, ry_bot, 0];
                        const pb_2 = (ridge_axis === 'Z') ? [0, ry_bot, -rZ] : [-rX, ry_bot, 0];
                        
                        const vertices = new Float32Array([
                            p_1[0], ry_top, p_1[2], p_2[0], ry_top, p_2[2],
                            ex, ey_top, ez,  -ex, ey_top, ez,  ex, ey_top, -ez,  -ex, ey_top, -ez,
                            pb_1[0], ry_bot, pb_1[2], pb_2[0], ry_bot, pb_2[2],
                            ex, ey_bot, ez,  -ex, ey_bot, ez,  ex, ey_bot, -ez,  -ex, ey_bot, -ez
                        ]);
                        const indices = [
                            0,3,2, 1,4,5, 0,2,4, 0,4,1, 0,1,5, 0,5,3, 
                            6,8,9, 7,11,10, 6,7,10, 6,10,8, 6,9,11, 6,11,7,
                            2,3,9, 2,9,8, 4,10,11, 4,11,5, 2,8,10, 2,10,4, 3,5,11, 3,11,9
                        ];
                        if (ridge_axis !== 'Z') {
                            indices.length = 0;
                            indices.push(0,2,4, 1,5,3, 0,1,3, 0,3,2, 0,4,5, 0,5,1);
                            indices.push(6,10,8, 7,9,11, 6,8,9, 6,9,7, 6,7,11, 6,11,10);
                            indices.push(2,3,9, 2,9,8, 4,10,11, 4,11,5, 2,8,10, 2,10,4, 3,5,11, 3,11,9);
                        }
                        
                        const rGeo = new THREE.BufferGeometry();
                        rGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                        rGeo.setIndex(indices);
                        rGeo.computeVertexNormals();
                        
                        const rMesh = new THREE.Mesh(rGeo, roofMat);
                        const rLine = new THREE.LineSegments(new THREE.EdgesGeometry(rGeo), edgeMat);
                        roofGroup.add(rMesh, rLine);
                    }
                    
                    // ★屋根のメッシュをクリック判定（interactiveMeshes）に追加し、上面(isRoof)として扱う設定
                    roofGroup.traverse(child => {
                        if (child.isMesh) {
                            child.userData = { id: b.id, isRoof: true };
                            interactiveMeshes.push(child);
                        }
                    });
                    houseGroup.add(roofGroup);
                }

                // --- 庇（下屋・単独軒庇）の生成 ---
                if (b.lowerRoof || (b.visors && b.visors.length > 0) || (b.flatVisors && b.flatVisors.length > 0)) {
                    const e = 600; // 軒の出
                    const slope = 0.4; // 勾配
                    const t = 150; // 厚み
                    
                    const skirtGroup = new THREE.Group();
                    // 基準高さ(Y=0)は1階の上面（天端）
                    skirtGroup.position.set(b.x, baseY + b.h, b.z); 

                    const roofVerts = [], roofInds = [];
                    const wallVerts = [], wallInds = [];
                    let rIdx = 0, wIdx = 0;

                    const addRoofQuad = (p0, p1, p2, p3) => {
                        roofVerts.push(...p0, ...p1, ...p2, ...p3);
                        roofInds.push(rIdx, rIdx+1, rIdx+2, rIdx, rIdx+2, rIdx+3);
                        rIdx += 4;
                    };
                    const addWallTri = (p0, p1, p2) => {
                        wallVerts.push(...p0, ...p1, ...p2);
                        wallInds.push(wIdx, wIdx+1, wIdx+2);
                        wIdx += 3;
                    };

                    const w2 = b.w / 2; 
                    const d2 = b.d / 2;

                    // ==========================================
                    // 1. 単独軒庇の生成 (visors)
                    // ==========================================
                    if (b.visors && b.visors.length > 0) {
                        const backDist = 300; // 奥側(建物内)に伸ばす距離
                        
                        const has_pz = b.visors.includes('pz'); 
                        const has_nz = b.visors.includes('nz'); 
                        const has_px = b.visors.includes('px'); 
                        const has_nx = b.visors.includes('nx'); 

                        // 面ごとのパラメータからケラバを取得（未設定なら300）
                        const getK = (d) => (b.visorParams && b.visorParams[d]) ? b.visorParams[d].keraba : 300;
                        const k_pz = getK('pz'); const k_nz = getK('nz'); 
                        const k_px = getK('px'); const k_nx = getK('nx'); 

                        const k_pz_L = has_nx ? 0 : k_pz; const k_pz_R = has_px ? 0 : k_pz; 
                        const k_nz_L = has_px ? 0 : k_nz; const k_nz_R = has_nx ? 0 : k_nz; 
                        const k_px_L = has_pz ? 0 : k_px; const k_px_R = has_nz ? 0 : k_px; 
                        const k_nx_L = has_nz ? 0 : k_nx; const k_nx_R = has_pz ? 0 : k_nx; 

                        const buildVisorFace = (dir, k_left, k_right, has_left_neighbor, has_right_neighbor) => {
                            // ★GUIのパラメータを取得
                            const params = (b.visorParams && b.visorParams[dir]) ? b.visorParams[dir] : { eaves: 600, slope: 4 };
                            const e_dir = params.eaves;
                            const slope_dir = params.slope / 10;
                            const dropOuter = e_dir * slope_dir;
                            const dropInner = backDist * slope_dir;

                            let pIT_L, pIT_R, pIB_L, pIB_R; 
                            let pOT_L, pOT_R, pOB_L, pOB_R; 
                            let pBT_L, pBT_R, pBB_L, pBB_R; 

                            if (dir === 'pz') {
                                pIT_L = [-w2-k_left, t, d2]; pIT_R = [w2+k_right, t, d2];
                                pIB_L = [-w2-k_left, 0, d2]; pIB_R = [w2+k_right, 0, d2];
                                
                                const outL = has_left_neighbor ? -w2-e_dir : -w2-k_left;
                                const outR = has_right_neighbor ? w2+e_dir : w2+k_right;
                                pOT_L = [outL, -dropOuter+t, d2+e_dir]; pOT_R = [outR, -dropOuter+t, d2+e_dir];
                                pOB_L = [outL, -dropOuter, d2+e_dir];   pOB_R = [outR, -dropOuter, d2+e_dir];
                                
                                const backL = has_left_neighbor ? -w2+backDist : -w2-k_left;
                                const backR = has_right_neighbor ? w2-backDist : w2+k_right;
                                pBT_L = [backL, -dropInner+t, d2-backDist]; pBT_R = [backR, -dropInner+t, d2-backDist];
                                pBB_L = [backL, -dropInner, d2-backDist];   pBB_R = [backR, -dropInner, d2-backDist];
                                
                            } else if (dir === 'nz') {
                                pIT_L = [w2+k_left, t, -d2]; pIT_R = [-w2-k_right, t, -d2];
                                pIB_L = [w2+k_left, 0, -d2]; pIB_R = [-w2-k_right, 0, -d2];
                                
                                const outL = has_left_neighbor ? w2+e_dir : w2+k_left;
                                const outR = has_right_neighbor ? -w2-e_dir : -w2-k_right;
                                pOT_L = [outL, -dropOuter+t, -d2-e_dir]; pOT_R = [outR, -dropOuter+t, -d2-e_dir];
                                pOB_L = [outL, -dropOuter, -d2-e_dir];   pOB_R = [outR, -dropOuter, -d2-e_dir];
                                
                                const backL = has_left_neighbor ? w2-backDist : w2+k_left;
                                const backR = has_right_neighbor ? -w2+backDist : -w2-k_right;
                                pBT_L = [backL, -dropInner+t, -d2+backDist]; pBT_R = [backR, -dropInner+t, -d2+backDist];
                                pBB_L = [backL, -dropInner, -d2+backDist];   pBB_R = [backR, -dropInner, -d2+backDist];

                            } else if (dir === 'px') {
                                pIT_L = [w2, t, d2+k_left]; pIT_R = [w2, t, -d2-k_right];
                                pIB_L = [w2, 0, d2+k_left]; pIB_R = [w2, 0, -d2-k_right];
                                
                                const outL = has_left_neighbor ? d2+e_dir : d2+k_left;
                                const outR = has_right_neighbor ? -d2-e_dir : -d2-k_right;
                                pOT_L = [w2+e_dir, -dropOuter+t, outL]; pOT_R = [w2+e_dir, -dropOuter+t, outR];
                                pOB_L = [w2+e_dir, -dropOuter, outL];   pOB_R = [w2+e_dir, -dropOuter, outR];
                                
                                const backL = has_left_neighbor ? d2-backDist : d2+k_left;
                                const backR = has_right_neighbor ? -d2+backDist : -d2-k_right;
                                pBT_L = [w2-backDist, -dropInner+t, backL]; pBT_R = [w2-backDist, -dropInner+t, backR];
                                pBB_L = [w2-backDist, -dropInner, backL];   pBB_R = [w2-backDist, -dropInner, backR];

                            } else if (dir === 'nx') {
                                pIT_L = [-w2, t, -d2-k_left]; pIT_R = [-w2, t, d2+k_right];
                                pIB_L = [-w2, 0, -d2-k_left]; pIB_R = [-w2, 0, d2+k_right];
                                
                                const outL = has_left_neighbor ? -d2-e_dir : -d2-k_left;
                                const outR = has_right_neighbor ? d2+e_dir : d2+k_right;
                                pOT_L = [-w2-e_dir, -dropOuter+t, outL]; pOT_R = [-w2-e_dir, -dropOuter+t, outR];
                                pOB_L = [-w2-e_dir, -dropOuter, outL];   pOB_R = [-w2-e_dir, -dropOuter, outR];
                                
                                const backL = has_left_neighbor ? -d2+backDist : -d2-k_left;
                                const backR = has_right_neighbor ? d2-backDist : d2+k_right;
                                pBT_L = [-w2+backDist, -dropInner+t, backL]; pBT_R = [-w2+backDist, -dropInner+t, backR];
                                pBB_L = [-w2+backDist, -dropInner, backL];   pBB_R = [-w2+backDist, -dropInner, backR];
                            }

                            addRoofQuad(pIT_L, pIT_R, pOT_R, pOT_L); 
                            addRoofQuad(pIB_R, pIB_L, pOB_L, pOB_R); 
                            addRoofQuad(pOT_R, pOT_L, pOB_L, pOB_R); 

                            // ケラバ(k_left, k_right)のどちらかが0より大きい場合のみ、奥側の面(への字の折り返し)を描画
                            if (k_left > 0 || k_right > 0) {
                                addRoofQuad(pBT_L, pBT_R, pIT_R, pIT_L); 
                                addRoofQuad(pIB_R, pIB_L, pBB_L, pBB_R); 
                                addRoofQuad(pBT_R, pBT_L, pBB_L, pBB_R); 
                            } else {
                                // ケラバが0の場合は壁面で塞ぐ（下屋と同様）
                                // 壁面の天端と底端を繋ぐ面を追加
                                addRoofQuad(pIT_L, pIT_R, pIB_R, pIB_L);
                            }

                            if (!has_left_neighbor) {
                                if (k_left > 0) {
                                    addRoofQuad(pBT_L, pBB_L, pIB_L, pIT_L);
                                }
                                addRoofQuad(pIT_L, pIB_L, pOB_L, pOT_L); 
                            }
                            if (!has_right_neighbor) {
                                if (k_right > 0) {
                                    addRoofQuad(pIT_R, pIB_R, pBB_R, pBT_R);
                                }
                                addRoofQuad(pOT_R, pOB_R, pIB_R, pIT_R); 
                            }
                        };

                        if (has_pz) buildVisorFace('pz', k_pz_L, k_pz_R, has_nx, has_px);
                        if (has_nz) buildVisorFace('nz', k_nz_L, k_nz_R, has_px, has_nx);
                        if (has_px) buildVisorFace('px', k_px_L, k_px_R, has_pz, has_nz);
                        if (has_nx) buildVisorFace('nx', k_nx_L, k_nx_R, has_nz, has_pz);
                    }

                    // ==========================================
                    // 2. 1階壁面が2階より出ている場合（下屋・回り込み）
                    // ==========================================
                    if (b.lowerRoof) {
                        const lr = b.lowerRoof;
                        const max_out = Math.max(lr.out_nx, lr.out_px, lr.out_nz, lr.out_pz);
                        if (max_out > 0) {
                            // ★ 修正：GUIで設定した下屋専用のパラメータを取得
                            const e_lr = lr.eaves !== undefined ? lr.eaves : 600;
                            const slope_lr = lr.slope !== undefined ? lr.slope / 10 : 0.4;
                            const k_lr = lr.keraba !== undefined ? lr.keraba : 300;

                            const H_max = max_out * slope_lr; 
                            const H_out_eaves = e_lr * slope_lr;
                            
                            const backDist = 300;       
                            const dropInner = backDist * slope_lr; 

                            const e_nx = e_lr * (lr.out_nx / max_out);
                            const e_px = e_lr * (lr.out_px / max_out);
                            const e_nz = e_lr * (lr.out_nz / max_out);
                            const e_pz = e_lr * (lr.out_pz / max_out);

                            const x_wall_L = -w2; const x_wall_R = w2;
                            const z_wall_B = -d2; const z_wall_F = d2;

                            const x_in_L = x_wall_L + lr.out_nx; const x_in_R = x_wall_R - lr.out_px;
                            const z_in_B = z_wall_B + lr.out_nz; const z_in_F = z_wall_F - lr.out_pz;

                            const x_out_L = x_wall_L - e_nx; const x_out_R = x_wall_R + e_px;
                            const z_out_B = z_wall_B - e_nz; const z_out_F = z_wall_F + e_pz;

                            // +Z面 (手前)
                            if (lr.out_pz > 0) { 
                                let x_L_in = x_in_L, x_L_out = x_out_L;
                                let x_R_in = x_in_R, x_R_out = x_out_R;
                                
                                if (lr.out_nx === 0) { x_L_in = x_wall_L - k_lr; x_L_out = x_wall_L - k_lr; }
                                if (lr.out_px === 0) { x_R_in = x_wall_R + k_lr; x_R_out = x_wall_R + k_lr; }
                                
                                const pIT_L = [x_L_in, H_max+t, z_in_F], pIT_R = [x_R_in, H_max+t, z_in_F];
                                const pIB_L = [x_L_in, H_max, z_in_F],   pIB_R = [x_R_in, H_max, z_in_F];
                                const pOT_L = [x_L_out, -H_out_eaves+t, z_out_F], pOT_R = [x_R_out, -H_out_eaves+t, z_out_F];
                                const pOB_L = [x_L_out, -H_out_eaves, z_out_F],   pOB_R = [x_R_out, -H_out_eaves, z_out_F];

                                addRoofQuad(pIT_L, pIT_R, pOT_R, pOT_L); 
                                addRoofQuad(pIB_R, pIB_L, pOB_L, pOB_R); 
                                addRoofQuad(pOT_R, pOT_L, pOB_L, pOB_R); 

                                if (lr.out_nx === 0) { 
                                    if (k_lr > 0) { // ★修正：ケラバがある時だけ「への字」を描画
                                        const pBT_L = [x_wall_L - k_lr, H_max-dropInner+t, z_in_F - backDist];
                                        const pBT_R = [x_wall_L, H_max-dropInner+t, z_in_F - backDist];
                                        const pBB_L = [x_wall_L - k_lr, H_max-dropInner, z_in_F - backDist];
                                        const pBB_R = [x_wall_L, H_max-dropInner, z_in_F - backDist];
                                        const piT_R = [x_wall_L, H_max+t, z_in_F];
                                        const piB_R = [x_wall_L, H_max, z_in_F];
                                        addRoofQuad(pBT_L, pBT_R, piT_R, pIT_L); 
                                        addRoofQuad(piB_R, pIB_L, pBB_L, pBB_R); 
                                        addRoofQuad(pBT_R, pBT_L, pBB_L, pBB_R); 
                                        addRoofQuad(pBT_L, pBB_L, pIB_L, pIT_L); 
                                    }
                                    addRoofQuad(pIT_L, pIB_L, pOB_L, pOT_L); // 側面を塞ぐ
                                    addWallTri([x_wall_L, H_max, z_in_F], [x_wall_L, 0, z_in_F], [x_wall_L, 0, z_wall_F]);
                                }
                                if (lr.out_px === 0) { 
                                    if (k_lr > 0) { // ★修正
                                        const pBT_L = [x_wall_R, H_max-dropInner+t, z_in_F - backDist];
                                        const pBT_R = [x_wall_R + k_lr, H_max-dropInner+t, z_in_F - backDist];
                                        const pBB_L = [x_wall_R, H_max-dropInner, z_in_F - backDist];
                                        const pBB_R = [x_wall_R + k_lr, H_max-dropInner, z_in_F - backDist];
                                        const piT_L = [x_wall_R, H_max+t, z_in_F];
                                        const piB_L = [x_wall_R, H_max, z_in_F];
                                        addRoofQuad(pBT_L, pBT_R, pIT_R, piT_L);
                                        addRoofQuad(pIB_R, piB_L, pBB_L, pBB_R);
                                        addRoofQuad(pBT_R, pBT_L, pBB_L, pBB_R);
                                        addRoofQuad(pIT_R, pIB_R, pBB_R, pBT_R); 
                                    }
                                    addRoofQuad(pOT_R, pOB_R, pIB_R, pIT_R); // 側面を塞ぐ
                                    addWallTri([x_wall_R, H_max, z_in_F], [x_wall_R, 0, z_wall_F], [x_wall_R, 0, z_in_F]);
                                }
                            }
                            
                            // -Z面 (奥)
                            if (lr.out_nz > 0) {
                                let x_inR = x_in_R, x_outR = x_out_R;
                                let x_inL = x_in_L, x_outL = x_out_L;

                                if (lr.out_px === 0) { x_inR = x_wall_R + k_lr; x_outR = x_wall_R + k_lr; }
                                if (lr.out_nx === 0) { x_inL = x_wall_L - k_lr; x_outL = x_wall_L - k_lr; }

                                const pIT_R = [x_inR, H_max+t, z_in_B], pIT_L = [x_inL, H_max+t, z_in_B];
                                const pIB_R = [x_inR, H_max, z_in_B],   pIB_L = [x_inL, H_max, z_in_B];
                                const pOT_R = [x_outR, -H_out_eaves+t, z_out_B], pOT_L = [x_outL, -H_out_eaves+t, z_out_B];
                                const pOB_R = [x_outR, -H_out_eaves, z_out_B],   pOB_L = [x_outL, -H_out_eaves, z_out_B];

                                addRoofQuad(pIT_R, pIT_L, pOT_L, pOT_R);
                                addRoofQuad(pIB_L, pIB_R, pOB_R, pOB_L);
                                addRoofQuad(pOT_L, pOT_R, pOB_R, pOB_L);

                                if (lr.out_px === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_R = [x_wall_R + k_lr, H_max-dropInner+t, z_in_B + backDist];
                                        const pBT_L = [x_wall_R, H_max-dropInner+t, z_in_B + backDist];
                                        const pBB_R = [x_wall_R + k_lr, H_max-dropInner, z_in_B + backDist];
                                        const pBB_L = [x_wall_R, H_max-dropInner, z_in_B + backDist];
                                        const piT_L = [x_wall_R, H_max+t, z_in_B];
                                        const piB_L = [x_wall_R, H_max, z_in_B];
                                        addRoofQuad(pBT_R, pBT_L, piT_L, pIT_R);
                                        addRoofQuad(piB_L, pIB_R, pBB_R, pBB_L);
                                        addRoofQuad(pBT_L, pBT_R, pBB_R, pBB_L);
                                        addRoofQuad(pBT_R, pBB_R, pIB_R, pIT_R); 
                                    }
                                    addRoofQuad(pIT_R, pIB_R, pOB_R, pOT_R); 
                                    addWallTri([x_wall_R, H_max, z_in_B], [x_wall_R, 0, z_in_B], [x_wall_R, 0, z_wall_B]);
                                }
                                if (lr.out_nx === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_R = [x_wall_L, H_max-dropInner+t, z_in_B + backDist];
                                        const pBT_L = [x_wall_L - k_lr, H_max-dropInner+t, z_in_B + backDist];
                                        const pBB_R = [x_wall_L, H_max-dropInner, z_in_B + backDist];
                                        const pBB_L = [x_wall_L - k_lr, H_max-dropInner, z_in_B + backDist];
                                        const piT_R = [x_wall_L, H_max+t, z_in_B];
                                        const piB_R = [x_wall_L, H_max, z_in_B];
                                        addRoofQuad(pBT_R, pBT_L, pIT_L, piT_R);
                                        addRoofQuad(pIB_L, piB_R, pBB_R, pBB_L);
                                        addRoofQuad(pBT_L, pBT_R, pBB_R, pBB_L);
                                        addRoofQuad(pIT_L, pIB_L, pBB_L, pBT_L); 
                                    }
                                    addRoofQuad(pOT_L, pOB_L, pIB_L, pIT_L); 
                                    addWallTri([x_wall_L, H_max, z_in_B], [x_wall_L, 0, z_wall_B], [x_wall_L, 0, z_in_B]);
                                }
                            }
                            
                            // +X面 (右)
                            if (lr.out_px > 0) {
                                let z_inB = z_in_B, z_outB = z_out_B; 
                                let z_inF = z_in_F, z_outF = z_out_F; 

                                if (lr.out_nz === 0) { z_inB = z_wall_B - k_lr; z_outB = z_wall_B - k_lr; }
                                if (lr.out_pz === 0) { z_inF = z_wall_F + k_lr; z_outF = z_wall_F + k_lr; }

                                const pIT_B = [x_in_R, H_max+t, z_inB], pIT_F = [x_in_R, H_max+t, z_inF];
                                const pIB_B = [x_in_R, H_max, z_inB],   pIB_F = [x_in_R, H_max, z_inF];
                                const pOT_B = [x_out_R, -H_out_eaves+t, z_outB], pOT_F = [x_out_R, -H_out_eaves+t, z_outF];
                                const pOB_B = [x_out_R, -H_out_eaves, z_outB],   pOB_F = [x_out_R, -H_out_eaves, z_outF];

                                addRoofQuad(pIT_B, pIT_F, pOT_F, pOT_B);
                                addRoofQuad(pIB_F, pIB_B, pOB_B, pOB_F);
                                addRoofQuad(pOT_F, pOT_B, pOB_B, pOB_F);

                                if (lr.out_nz === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_B = [x_in_R - backDist, H_max-dropInner+t, z_wall_B - k_lr];
                                        const pBT_F = [x_in_R - backDist, H_max-dropInner+t, z_wall_B];
                                        const pBB_B = [x_in_R - backDist, H_max-dropInner, z_wall_B - k_lr];
                                        const pBB_F = [x_in_R - backDist, H_max-dropInner, z_wall_B];
                                        const piT_F = [x_in_R, H_max+t, z_wall_B];
                                        const piB_F = [x_in_R, H_max, z_wall_B];
                                        addRoofQuad(pBT_B, pBT_F, piT_F, pIT_B);
                                        addRoofQuad(piB_F, pIB_B, pBB_B, pBB_F);
                                        addRoofQuad(pBT_F, pBT_B, pBB_B, pBB_F);
                                        addRoofQuad(pBT_B, pBB_B, pIB_B, pIT_B); 
                                    }
                                    addRoofQuad(pIT_B, pIB_B, pOB_B, pOT_B); 
                                    addWallTri([x_in_R, H_max, z_wall_B], [x_wall_R, 0, z_wall_B], [x_in_R, 0, z_wall_B]);
                                }
                                if (lr.out_pz === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_B = [x_in_R - backDist, H_max-dropInner+t, z_wall_F];
                                        const pBT_F = [x_in_R - backDist, H_max-dropInner+t, z_wall_F + k_lr];
                                        const pBB_B = [x_in_R - backDist, H_max-dropInner, z_wall_F];
                                        const pBB_F = [x_in_R - backDist, H_max-dropInner, z_wall_F + k_lr];
                                        const piT_B = [x_in_R, H_max+t, z_wall_F];
                                        const piB_B = [x_in_R, H_max, z_wall_F];
                                        addRoofQuad(pBT_B, pBT_F, pIT_F, piT_B);
                                        addRoofQuad(pIB_F, piB_B, pBB_B, pBB_F);
                                        addRoofQuad(pBT_F, pBT_B, pBB_B, pBB_F);
                                        addRoofQuad(pIT_F, pIB_F, pBB_F, pBT_F); 
                                    }
                                    addRoofQuad(pOT_F, pOB_F, pIB_F, pIT_F); 
                                    addWallTri([x_in_R, H_max, z_wall_F], [x_in_R, 0, z_wall_F], [x_wall_R, 0, z_wall_F]);
                                }
                            }
                            
                            // -X面 (左)
                            if (lr.out_nx > 0) {
                                let z_inF = z_in_F, z_outF = z_out_F;
                                let z_inB = z_in_B, z_outB = z_out_B;

                                if (lr.out_pz === 0) { z_inF = z_wall_F + k_lr; z_outF = z_wall_F + k_lr; }
                                if (lr.out_nz === 0) { z_inB = z_wall_B - k_lr; z_outB = z_wall_B - k_lr; }

                                const pIT_F = [x_in_L, H_max+t, z_inF], pIT_B = [x_in_L, H_max+t, z_inB];
                                const pIB_F = [x_in_L, H_max, z_inF],   pIB_B = [x_in_L, H_max, z_inB];
                                const pOT_F = [x_out_L, -H_out_eaves+t, z_outF], pOT_B = [x_out_L, -H_out_eaves+t, z_outB];
                                const pOB_F = [x_out_L, -H_out_eaves, z_outF],   pOB_B = [x_out_L, -H_out_eaves, z_outB];

                                addRoofQuad(pIT_F, pIT_B, pOT_B, pOT_F);
                                addRoofQuad(pIB_B, pIB_F, pOB_F, pOB_B);
                                addRoofQuad(pOT_B, pOT_F, pOB_F, pOB_B);

                                if (lr.out_pz === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_F = [x_in_L + backDist, H_max-dropInner+t, z_wall_F + k_lr];
                                        const pBT_B = [x_in_L + backDist, H_max-dropInner+t, z_wall_F];
                                        const pBB_F = [x_in_L + backDist, H_max-dropInner, z_wall_F + k_lr];
                                        const pBB_B = [x_in_L + backDist, H_max-dropInner, z_wall_F];
                                        const piT_B = [x_in_L, H_max+t, z_wall_F];
                                        const piB_B = [x_in_L, H_max, z_wall_F];
                                        addRoofQuad(pBT_F, pBT_B, piT_B, pIT_F);
                                        addRoofQuad(piB_B, pIB_F, pBB_F, pBB_B);
                                        addRoofQuad(pBT_B, pBT_F, pBB_F, pBB_B);
                                        addRoofQuad(pBT_F, pBB_F, pIB_F, pIT_F); 
                                    }
                                    addRoofQuad(pIT_F, pIB_F, pOB_F, pOT_F); 
                                    addWallTri([x_in_L, H_max, z_wall_F], [x_wall_L, 0, z_wall_F], [x_in_L, 0, z_wall_F]);
                                }
                                if (lr.out_nz === 0) {
                                    if (k_lr > 0) { // ★修正
                                        const pBT_F = [x_in_L + backDist, H_max-dropInner+t, z_wall_B];
                                        const pBT_B = [x_in_L + backDist, H_max-dropInner+t, z_wall_B - k_lr];
                                        const pBB_F = [x_in_L + backDist, H_max-dropInner, z_wall_B];
                                        const pBB_B = [x_in_L + backDist, H_max-dropInner, z_wall_B - k_lr];
                                        const piT_F = [x_in_L, H_max+t, z_wall_B];
                                        const piB_F = [x_in_L, H_max, z_wall_B];
                                        addRoofQuad(pBT_F, pBT_B, pIT_B, piT_F);
                                        addRoofQuad(pIB_B, piB_F, pBB_F, pBB_B);
                                        addRoofQuad(pBT_B, pBT_F, pBB_F, pBB_B);
                                        addRoofQuad(pIT_B, pIB_B, pBB_B, pBT_B); 
                                    }
                                    addRoofQuad(pOT_B, pOB_B, pIB_B, pIT_B); 
                                    addWallTri([x_in_L, H_max, z_wall_B], [x_in_L, 0, z_wall_B], [x_wall_L, 0, z_wall_B]);
                                }
                            }
                        }
                    }

                    // ジオメトリ生成とグループ追加（★誤って消えていた部分を復元）
                    if (roofVerts.length > 0) {
                        const rGeo = new THREE.BufferGeometry();
                        rGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(roofVerts), 3));
                        rGeo.setIndex(roofInds);
                        rGeo.computeVertexNormals();
                        skirtGroup.add(new THREE.Mesh(rGeo, roofMat));
                        skirtGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(rGeo), edgeMat));
                    }
                    if (wallVerts.length > 0) {
                        const wGeo = new THREE.BufferGeometry();
                        wGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(wallVerts), 3));
                        wGeo.setIndex(wallInds);
                        wGeo.computeVertexNormals();
                        const wMat = wallMat; 
                        skirtGroup.add(new THREE.Mesh(wGeo, wMat));
                        skirtGroup.add(new THREE.LineSegments(new THREE.EdgesGeometry(wGeo), edgeMat));
                    }

                    // ==========================================
                    // 3. 水平庇の生成 (flatVisors)
                    // ==========================================
                    if (b.flatVisors && b.flatVisors.length > 0) {
                        const t_flat = 100; // 厚さ100mm
                        
                        b.flatVisors.forEach(dir => {
                            // ★GUIのパラメータを取得
                            const params = (b.flatVisorParams && b.flatVisorParams[dir]) ? b.flatVisorParams[dir] : { depth: 300, offsetY: 0, margin: 0 };
                            const e_flat = params.depth;     // 出寸法
                            const o_y = params.offsetY;      // 高さ下がり（マイナス値）
                            const m_flat = params.margin;    // 端からの空き
                            
                            // 両端から空き(margin)を引いた実際の幅
                            const flat_w = Math.max(10, b.w - m_flat * 2);
                            const flat_d = Math.max(10, b.d - m_flat * 2);

                            let fGeo, fPos;
                            // y座標はデフォルト -t_flat/2 。それに o_y を足す。
                            if (dir === 'pz') {
                                fGeo = new THREE.BoxGeometry(flat_w, t_flat, e_flat);
                                fPos = new THREE.Vector3(0, -t_flat/2 + o_y, b.d/2 + e_flat/2);
                            } else if (dir === 'nz') {
                                fGeo = new THREE.BoxGeometry(flat_w, t_flat, e_flat);
                                fPos = new THREE.Vector3(0, -t_flat/2 + o_y, -b.d/2 - e_flat/2);
                            } else if (dir === 'px') {
                                fGeo = new THREE.BoxGeometry(e_flat, t_flat, flat_d);
                                fPos = new THREE.Vector3(b.w/2 + e_flat/2, -t_flat/2 + o_y, 0);
                            } else if (dir === 'nx') {
                                fGeo = new THREE.BoxGeometry(e_flat, t_flat, flat_d);
                                fPos = new THREE.Vector3(-b.w/2 - e_flat/2, -t_flat/2 + o_y, 0);
                            }

                            if (fGeo && fPos) {
                                const fMesh = new THREE.Mesh(fGeo, wallMat);
                                fMesh.position.copy(fPos);
                                
                                const fLine = new THREE.LineSegments(new THREE.EdgesGeometry(fGeo), edgeMat);
                                fLine.position.copy(fPos);
                                
                                skirtGroup.add(fMesh, fLine);
                            }
                        });
                    }
                    // ★追加：庇の全パーツにタグ付け（idとside属性を持たせる）
                    skirtGroup.children.forEach(child => {
                        if (!child.isMesh && !child.isLineSegments) return;

                        // 基本のIDと装飾フラグ
                        child.userData = { id: b.id, isDeco: true };

                        // 下屋のパーツ（斜面・三角形の壁）か、単独の庇かを判定してタイプを分ける
                        // ※作成時に使用したジオメトリの変数名や構造から判断
                        if (child.geometry.type === "BufferGeometry") { 
                            // 下屋（BufferGeometryで作られた斜面や壁）
                            child.userData.type = 'lowerRoof';
                        } else {
                            // 単独の庇（BoxGeometryで作られた水平庇など）
                            child.userData.type = 'side';
                        }
                    });
                    houseGroup.add(skirtGroup);
                }

                // ==========================================
                // 4. バルコニーの生成 (balconies)
                // ==========================================
                if (b.balconies) {
                    const t_floor = 100; // 床厚
                    const t_wall = 100;  // 側壁の厚み

                    for (let dir in b.balconies) {
                        const type = b.balconies[dir];
                        // パラメータ取得（設定がない場合は初期値を使用）
                        const p = b.balcParams && b.balcParams[dir] ? b.balcParams[dir] : { depth: 1000, h_handrail: 1100, h_side: 1100 };
                        const d_total = p.depth;
                        const d_floor = d_total - t_wall;
                        const h_wall = p.h_handrail; // 前面（手すり）の高さ
                        const h_side = p.h_side;     // 側面壁の高さ

                        const balcGroup = new THREE.Group();
                        // 基準高さはブロックの底面 + 100mm
                        balcGroup.position.set(b.x, baseY + 100, b.z);

                        const w2 = b.w / 2;
                        const d2 = b.d / 2;
                        const parts = [];

                        // --- 1. 床面と側壁の生成 (h_side を適用) ---
                        if (dir === 'pz') { // 手前 (+Z)
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(b.w, t_floor, d_total), pos: new THREE.Vector3(0, t_floor/2, d2 + d_total/2) }); // 床
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(t_wall, h_side, d_total), pos: new THREE.Vector3(-w2 + t_wall/2, t_floor + h_side/2, d2 + d_total/2) }); // 左側壁
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(t_wall, h_side, d_total), pos: new THREE.Vector3(w2 - t_wall/2, t_floor + h_side/2, d2 + d_total/2) }); // 右側壁
                        } else if (dir === 'nz') { // 奥 (-Z)
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(b.w, t_floor, d_total), pos: new THREE.Vector3(0, t_floor/2, -d2 - d_total/2) }); // 床
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(t_wall, h_side, d_total), pos: new THREE.Vector3(-w2 + t_wall/2, t_floor + h_side/2, -d2 - d_total/2) }); // 左側壁
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(t_wall, h_side, d_total), pos: new THREE.Vector3(w2 - t_wall/2, t_floor + h_side/2, -d2 - d_total/2) }); // 右側壁
                        } else if (dir === 'px') { // 右 (+X)
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, t_floor, b.d), pos: new THREE.Vector3(w2 + d_total/2, t_floor/2, 0) }); // 床
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, h_side, t_wall), pos: new THREE.Vector3(w2 + d_total/2, t_floor + h_side/2, -d2 + t_wall/2) }); // 奥側壁
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, h_side, t_wall), pos: new THREE.Vector3(w2 + d_total/2, t_floor + h_side/2, d2 - t_wall/2) }); // 手前側壁
                        } else if (dir === 'nx') { // 左 (-X)
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, t_floor, b.d), pos: new THREE.Vector3(-w2 - d_total/2, t_floor/2, 0) }); // 床
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, h_side, t_wall), pos: new THREE.Vector3(-w2 - d_total/2, t_floor + h_side/2, -d2 + t_wall/2) }); // 奥側壁
                            parts.push({ mat: balcWallMat, geo: new THREE.BoxGeometry(d_total, h_side, t_wall), pos: new THREE.Vector3(-w2 - d_total/2, t_floor + h_side/2, d2 - t_wall/2) }); // 手前側壁
                        }

                        // --- 2. 前面の枠・格子の生成 (h_wall を適用) ---
                        const L = (dir === 'pz' || dir === 'nz') ? b.w - t_wall * 2 : b.d - t_wall * 2;
                        const frameW = 50; 

                        const frameShape = new THREE.Shape();
                        frameShape.moveTo(-L / 2, -20); frameShape.lineTo(L / 2, -20);
                        frameShape.lineTo(L / 2, h_wall); frameShape.lineTo(-L / 2, h_wall);
                        frameShape.lineTo(-L / 2, -20);

                        if (type === 'glass') {
                            const N = Math.max(1, Math.round(L / 700));
                            const S = L / N;
                            for (let i = 0; i < N; i++) {
                                let left = (i === 0) ? (-L / 2 + frameW) : (-L / 2 + i * S + frameW / 2);
                                let right = (i + 1 === N) ? (L / 2 - frameW) : (-L / 2 + (i + 1) * S - frameW / 2);
                                
                                const hole = new THREE.Path();
                                hole.moveTo(left, frameW); hole.lineTo(right, frameW);
                                hole.lineTo(right, h_wall - frameW); hole.lineTo(left, h_wall - frameW);
                                hole.lineTo(left, frameW);
                                frameShape.holes.push(hole);

                                let gW = right - left, gH = h_wall - frameW * 2, gCx = (left + right) / 2;
                                const t_glass = 10;
                                let gPos = new THREE.Vector3(), gGeo = (dir === 'pz' || dir === 'nz') ? new THREE.BoxGeometry(gW, gH, t_glass) : new THREE.BoxGeometry(t_glass, gH, gW);
                                if (dir === 'pz') gPos.set(gCx, t_floor + h_wall / 2, d2 + d_floor + t_wall / 2);
                                else if (dir === 'nz') gPos.set(gCx, t_floor + h_wall / 2, -d2 - d_floor - t_wall / 2);
                                else if (dir === 'px') gPos.set(w2 + d_floor + t_wall / 2, t_floor + h_wall / 2, gCx);
                                else if (dir === 'nx') gPos.set(-w2 - d_floor - t_wall / 2, t_floor + h_wall / 2, gCx);
                                parts.push({ mat: balcGlassMat, geo: gGeo, pos: gPos });
                            }
                        } else if (type === 'lattice') {
                            const N_pillars = Math.max(1, Math.round(L / 1100));
