                            const S_pillar = L / N_pillars;
                            const botGap = 110;

                            for (let i = 0; i < N_pillars; i++) {
                                let cLeft = -L / 2 + i * S_pillar;
                                let cRight = -L / 2 + (i + 1) * S_pillar;
                                let pLeft = cLeft + (i === 0 ? frameW : frameW / 2);
                                let pRight = cRight - (i + 1 === N_pillars ? frameW : frameW / 2);
                                let innerW = pRight - pLeft;

                                const botHole = new THREE.Path();
                                botHole.moveTo(pLeft, -10); botHole.lineTo(pRight, -10);
                                botHole.lineTo(pRight, botGap); botHole.lineTo(pLeft, botGap);
                                botHole.lineTo(pLeft, -10);
                                frameShape.holes.push(botHole);

                                const max_gap = 110;
                                const picket_w = 50;
                                let n_pickets = Math.max(0, Math.ceil((innerW - max_gap) / (picket_w + max_gap)));
                                const actual_gap = (innerW - n_pickets * picket_w) / (n_pickets + 1);

                                for (let j = 0; j <= n_pickets; j++) {
                                    let hLeft = pLeft + j * (actual_gap + picket_w);
                                    let hRight = hLeft + actual_gap;
                                    if (hRight > hLeft) {
                                        const pHole = new THREE.Path();
                                        pHole.moveTo(hLeft, botGap + 50); pHole.lineTo(hRight, botGap + 50);
                                        pHole.lineTo(hRight, h_wall - 50); pHole.lineTo(hLeft, h_wall - 50);
                                        pHole.lineTo(hLeft, botGap + 50);
                                        frameShape.holes.push(pHole);
                                    }
                                }
                            }
                        }

                        const frameDepth = 50; 
                        const frameGeo = new THREE.ExtrudeGeometry(frameShape, { depth: frameDepth, bevelEnabled: false });
                        frameGeo.translate(0, 0, -frameDepth / 2);
                        
                        let fPos = new THREE.Vector3();
                        if (dir === 'pz') fPos.set(0, t_floor, d2 + d_floor + t_wall / 2);
                        else if (dir === 'nz') { frameGeo.rotateY(Math.PI); fPos.set(0, t_floor, -d2 - d_floor - t_wall / 2); }
                        else if (dir === 'px') { frameGeo.rotateY(Math.PI / 2); fPos.set(w2 + d_floor + t_wall / 2, t_floor, 0); }
                        else if (dir === 'nx') { frameGeo.rotateY(-Math.PI / 2); fPos.set(-w2 - d_floor - t_wall / 2, t_floor, 0); }
                        parts.push({ mat: roofMat, geo: frameGeo, pos: fPos });

                        // 描画
                        parts.forEach(part => {
                            const mesh = new THREE.Mesh(part.geo, part.mat);
                            mesh.position.copy(part.pos);
                            const edges = new THREE.EdgesGeometry(part.geo);
                            const line = new THREE.LineSegments(edges, edgeMat);
                            line.position.copy(part.pos);
                            balcGroup.add(mesh, line);
                        });
                        // ★変更：id属性を追加
                        balcGroup.traverse(child => {
                            if (child.isMesh || child.isLineSegments) child.userData = { isDeco: true, type: 'balcony', dir: dir, id: b.id };
                        });
                        houseGroup.add(balcGroup);
                    }
                }

                // ==========================================
                // 5. つけ柱・付け梁の生成 (pilasters & beams)
                // ==========================================
                if (b.pilasters) {
                    for (let dir in b.pilasters) {
                        // ★修正：面(dir)ごとにグループを作成するようにループ内に移動
                        const pillarGroup = new THREE.Group();
                        pillarGroup.position.set(b.x, baseY, b.z); 

                        const params = b.pilasterParams[dir] || { pitch: 1000 };
                        const L = (dir === 'pz' || dir === 'nz') ? b.w : b.d;
                        const pillarW = 100; 
                        const pillarD = 50;  // 柱・梁共通の厚み
                        const beamH = 100;   // 梁の幅(高さ)
                        const targetPitch = params.pitch;

                        if (L < pillarW) continue;

                        const currentBeamY = params.beamY !== undefined ? params.beamY : (b.h - beamH);
                        
                        // ■ 1. 付け梁 (Beam) の生成
                        const beamGeo = (dir === 'pz' || dir === 'nz') 
                            ? new THREE.BoxGeometry(L, beamH, pillarD)
                            : new THREE.BoxGeometry(pillarD, beamH, L);
                        
                        let beamPos = new THREE.Vector3();
                        let beamYCenter = currentBeamY + beamH / 2;

                        if (dir === 'pz') beamPos.set(0, beamYCenter, b.d / 2 + pillarD / 2);
                        else if (dir === 'nz') beamPos.set(0, beamYCenter, -b.d / 2 - pillarD / 2);
                        else if (dir === 'px') beamPos.set(b.w / 2 + pillarD / 2, beamYCenter, 0);
                        else if (dir === 'nx') beamPos.set(-b.w / 2 - pillarD / 2, beamYCenter, 0);

                        const beamMesh = new THREE.Mesh(beamGeo, woodMat);
                        beamMesh.position.copy(beamPos);
                        const beamLine = new THREE.LineSegments(new THREE.EdgesGeometry(beamGeo), edgeMat);
                        beamLine.position.copy(beamPos);
                        pillarGroup.add(beamMesh, beamLine);

                        // ■ 2. つけ柱 (Pilasters) の生成
                        const spanDistance = L - pillarW; 
                        const N_spans = Math.max(1, Math.round(spanDistance / targetPitch)); 
                        const actualPitch = spanDistance / N_spans;
                        const bottomOffset = (baseY === 0) ? 100 : 0;

                        for (let i = 0; i <= N_spans; i++) {
                            if (params.visiblePillars && params.visiblePillars[i] === false) continue;
                            let cx = (-L / 2 + pillarW / 2) + i * actualPitch;

                            const segments = [
                                { bot: bottomOffset, top: currentBeamY },       
                                { bot: currentBeamY + beamH, top: b.h }         
                            ];

                            segments.forEach(seg => {
                                const segH = seg.top - seg.bot;
                                if (segH > 1) { 
                                    const pGeo = new THREE.BoxGeometry(pillarW, segH, pillarD);
                                    let pPos = new THREE.Vector3();
                                    let cy = seg.bot + segH / 2;

                                    if (dir === 'pz') {
                                        pPos.set(cx, cy, b.d / 2 + pillarD / 2);
                                    } else if (dir === 'nz') {
                                        pPos.set(cx, cy, -b.d / 2 - pillarD / 2);
                                    } else if (dir === 'px') {
                                        pGeo.rotateY(Math.PI / 2); 
                                        pPos.set(b.w / 2 + pillarD / 2, cy, cx);
                                    } else if (dir === 'nx') {
                                        pGeo.rotateY(Math.PI / 2); 
                                        pPos.set(-b.w / 2 - pillarD / 2, cy, cx);
                                    }

                                    const pMesh = new THREE.Mesh(pGeo, woodMat);
                                    pMesh.position.copy(pPos);
                                    const pLine = new THREE.LineSegments(new THREE.EdgesGeometry(pGeo), edgeMat);
                                    pLine.position.copy(pPos);
                                    pillarGroup.add(pMesh, pLine);
                                }
                            });
                        }

                        // ★変更：id属性を追加
                        pillarGroup.traverse(child => {
                            if (child.isMesh || child.isLineSegments) child.userData = { isDeco: true, type: 'pilaster', dir: dir, id: b.id };
                        });
                        houseGroup.add(pillarGroup);
                    }
                }
                // ==========================================
                // 6. 掃き出し窓の生成 (windows) (立面図的フラット表現版)
                // ==========================================
                if (b.windows) {
                    for (let dir in b.windows) {
                        const windowGroup = new THREE.Group();
                        
                        // パラメータ取得（設定がない場合は初期値）
                        const p = b.windowParams && b.windowParams[dir] ? b.windowParams[dir] : { height: 2000, offsetX: 0, offsetY: 0 };

                        // 寸法設定
                        const h_sash = p.height; 
                        const w_total = 1970; 
                        const fw = 30; 
                        const z_thick = 30; 
                        const g_thick = 20; 

                        // ★ Yの基準：上端を固定する計算
                        // 標準の上端位置 = baseY + 100(犬走り) + 2000(標準高さ) = baseY + 2100
                        const topY = baseY + 2100 + p.offsetY; 
                        
                        // グループの中心Yは、上端から「現在の高さの半分」を下ろした位置
                        windowGroup.position.set(b.x, topY - h_sash / 2, b.z);

                        // 面の方向に応じた回転とオフセット（壁表面のZ位置）の計算
                        let rotY = 0;
                        let offsetZ = 0;
                        if (dir === 'pz') { rotY = 0; offsetZ = b.d / 2; }
                        else if (dir === 'nz') { rotY = Math.PI; offsetZ = b.d / 2; }
                        else if (dir === 'px') { rotY = Math.PI / 2; offsetZ = b.w / 2; }
                        else if (dir === 'nx') { rotY = -Math.PI / 2; offsetZ = b.w / 2; }

                        // 1. 枠のShape (全体幅1970からガラス部分の穴を2つくり抜く)
                        const sashShape = new THREE.Shape();
                        sashShape.moveTo(-w_total/2, -h_sash/2);
                        sashShape.lineTo(w_total/2, -h_sash/2);
                        sashShape.lineTo(w_total/2, h_sash/2);
                        sashShape.lineTo(-w_total/2, h_sash/2);
                        sashShape.lineTo(-w_total/2, -h_sash/2);

                        // 左側のガラス穴 (幅940mm)
                        const holeL = new THREE.Path();
                        holeL.moveTo(-w_total/2 + fw, -h_sash/2 + fw);
                        holeL.lineTo(-fw/2, -h_sash/2 + fw);
                        holeL.lineTo(-fw/2, h_sash/2 - fw);
                        holeL.lineTo(-w_total/2 + fw, h_sash/2 - fw);
                        holeL.lineTo(-w_total/2 + fw, -h_sash/2 + fw);
                        sashShape.holes.push(holeL);

                        // 右側のガラス穴 (幅940mm)
                        const holeR = new THREE.Path();
                        holeR.moveTo(fw/2, -h_sash/2 + fw);
                        holeR.lineTo(w_total/2 - fw, -h_sash/2 + fw);
                        holeR.lineTo(w_total/2 - fw, h_sash/2 - fw);
                        holeR.lineTo(fw/2, h_sash/2 - fw);
                        holeR.lineTo(fw/2, -h_sash/2 + fw);
                        sashShape.holes.push(holeR);

                        const sashGeo = new THREE.ExtrudeGeometry(sashShape, { depth: z_thick, bevelEnabled: false });
                        sashGeo.translate(0, 0, -z_thick/2); 

                        // 2. 枠パーツの配置 (壁の表面から枠の厚みの半分だけ出す)
                        const sashPos = new THREE.Vector3(0, 0, offsetZ + z_thick/2);
                        const sashMesh = new THREE.Mesh(sashGeo, sashMat);
                        sashMesh.position.copy(sashPos);
                        const sashLine = new THREE.LineSegments(new THREE.EdgesGeometry(sashGeo), edgeMat);
                        sashLine.position.copy(sashPos);
                        windowGroup.add(sashMesh, sashLine);

                        // 3. ガラスのジオメトリと配置
                        const g_width = (w_total - fw * 3) / 2; // 940mm
                        const g_height = h_sash - fw * 2;       // 1940mm
                        const glassGeo = new THREE.BoxGeometry(g_width, g_height, g_thick);

                        // ガラスの中心位置 (枠と同じZ平面上に配置)
                        const glassPosX_L = -w_total/2 + fw + g_width/2; // -485
                        const glassPosX_R = w_total/2 - fw - g_width/2;  // 485

                        const posL = new THREE.Vector3(glassPosX_L, 0, offsetZ + z_thick/2);
                        const posR = new THREE.Vector3(glassPosX_R, 0, offsetZ + z_thick/2);

                        // 左ガラス
                        const leftGlass = new THREE.Mesh(glassGeo, windowGlassMat);
                        leftGlass.position.copy(posL);
                        const leftGlassLine = new THREE.LineSegments(new THREE.EdgesGeometry(glassGeo), edgeMat);
                        leftGlassLine.position.copy(posL);
                        windowGroup.add(leftGlass, leftGlassLine);

                        // 右ガラス
                        const rightGlass = new THREE.Mesh(glassGeo, windowGlassMat);
                        rightGlass.position.copy(posR);
                        const rightGlassLine = new THREE.LineSegments(new THREE.EdgesGeometry(glassGeo), edgeMat);
                        rightGlassLine.position.copy(posR);
                        windowGroup.add(rightGlass, rightGlassLine);

                        // 対象の面の向きに回転して追加
                        windowGroup.rotation.y = rotY;
                        // ★追加：回転した後にX軸移動することで、対象面の右方向・左方向へスライドする
                        windowGroup.translateX(p.offsetX); 
                        // ★追加：窓の全パーツにタグ付け
                        windowGroup.traverse(child => {
                            if (child.isMesh || child.isLineSegments) child.userData = { isDeco: true, type: 'window', dir: dir, id: b.id };
                        });
                        houseGroup.add(windowGroup);
                    }
                }       

                // ==========================================
                // 7. 玄関扉・ポーチの生成 (doors)
                // ==========================================
                if (b.doors && baseY === 0) { // 念のためここでも1階(baseY=0)限定にする
                    for (let dir in b.doors) {
                        const doorGroup = new THREE.Group();
                        const p = b.doorParams && b.doorParams[dir] ? b.doorParams[dir] : { offsetX: 0 };
                        
                        // 寸法設定
                        const w_door = 900, h_door = 2000, d_door = 50; 
                        const w_porch = 1500, h_porch = 100, d_porch = 900;

                        // 面の方向に応じた回転とオフセット（壁表面のZ位置）
                        let rotY = 0, offsetZ = 0;
                        if (dir === 'pz') { rotY = 0; offsetZ = b.d / 2; }
                        else if (dir === 'nz') { rotY = Math.PI; offsetZ = b.d / 2; }
                        else if (dir === 'px') { rotY = Math.PI / 2; offsetZ = b.w / 2; }
                        else if (dir === 'nx') { rotY = -Math.PI / 2; offsetZ = b.w / 2; }

                        // --- 1. 玄関ポーチ (Porch) ---
                        const porchGeo = new THREE.BoxGeometry(w_porch, h_porch, d_porch);
                        // Z位置: 壁の表面(offsetZ) から d_porch/2(1000mm) 手前に飛び出させる
                        const porchPos = new THREE.Vector3(0, h_porch / 2, offsetZ + d_porch / 2);
                        const porchMesh = new THREE.Mesh(porchGeo, porchMat);
                        porchMesh.position.copy(porchPos);
                        const porchLine = new THREE.LineSegments(new THREE.EdgesGeometry(porchGeo), edgeMat);
                        porchLine.position.copy(porchPos);
                        doorGroup.add(porchMesh, porchLine);

                        // --- 2. 玄関扉 (Door) ---
                        const doorGeo = new THREE.BoxGeometry(w_door, h_door, d_door);
                        // Y位置: ポーチの上端(h_porch) + 扉の高さの半分(h_door/2)
                        // Z位置: 壁の表面(offsetZ) + 扉の厚みの半分(d_door/2)
                        const doorPos = new THREE.Vector3(0, h_porch + h_door / 2, offsetZ + d_door / 2);
                        const doorMesh = new THREE.Mesh(doorGeo, doorMat);
                        doorMesh.position.copy(doorPos);
                        const doorLine = new THREE.LineSegments(new THREE.EdgesGeometry(doorGeo), edgeMat);
                        doorLine.position.copy(doorPos);
                        doorGroup.add(doorMesh, doorLine);

                        // 基準位置はブロックの底面 (baseY)
                        doorGroup.position.set(b.x, baseY, b.z);

                        // 対象の面の向きに回転し、ヨコ位置をスライド
                        doorGroup.rotation.y = rotY;
                        doorGroup.translateX(p.offsetX); 
                        // ★追加：玄関の全パーツにタグ付け
                        doorGroup.traverse(child => {
                            if (child.isMesh || child.isLineSegments) child.userData = { isDeco: true, type: 'door', dir: dir, id: b.id };
                        });
                        houseGroup.add(doorGroup);
                    }
                }

            });
            renderer.render(scene, camera);
        }

        saveState();

        // --- マウス操作設定 ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let activePlane = new THREE.Plane(); 

        function snap(val) { return Math.round(val / 500) * 500; }

        let isDrawing = false;
        let drawStartPt = new THREE.Vector3();
        let currentDrawObj = null; 

        // プッシュプル関連
        let isExtruding = false;
        let extrudeTargetId = null;
        let extrudeNormal = new THREE.Vector3();
        let connectedBlocks = []; 
        let extrudeStartY = 0;
        let extrudeStartPt = new THREE.Vector3(); 

        let downPointer = new THREE.Vector2(); 

        function getGroundIntersect(e) {
            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);
            const target = new THREE.Vector3();
            
            // ★修正: intersectPlaneの戻り値(intersect)を使って正しく成否判定する
            const intersect = raycaster.ray.intersectPlane(groundPlane, target);
            if(intersect) {
                target.x = snap(target.x);
                target.z = snap(target.z);
                return target;
            }
            return null;
        }

        function updateHoverMesh(b, normal) {
            const baseY = b.y || 0;
            if (normal.y > 0.5) { 
                hoverMesh.scale.set(b.w, b.d, 1);
                hoverMesh.rotation.set(-Math.PI/2, 0, 0);
                hoverMesh.position.set(b.x, baseY + b.h + 2, b.z);
            } else if (normal.x > 0.5) { 
                hoverMesh.scale.set(b.d, b.h, 1);
                hoverMesh.rotation.set(0, Math.PI/2, 0);
                hoverMesh.position.set(b.x + b.w/2 + 2, baseY + b.h/2, b.z);
            } else if (normal.x < -0.5) { 
                hoverMesh.scale.set(b.d, b.h, 1);
                hoverMesh.rotation.set(0, -Math.PI/2, 0);
                hoverMesh.position.set(b.x - b.w/2 - 2, baseY + b.h/2, b.z);
            } else if (normal.z > 0.5) { 
                hoverMesh.scale.set(b.w, b.h, 1);
                hoverMesh.rotation.set(0, 0, 0);
                hoverMesh.position.set(b.x, baseY + b.h/2, b.z + b.d/2 + 2);
            } else if (normal.z < -0.5) { 
                hoverMesh.scale.set(b.w, b.h, 1);
                hoverMesh.rotation.set(0, Math.PI, 0);
                hoverMesh.position.set(b.x, baseY + b.h/2, b.z - b.d/2 - 2);
            }
            hoverMesh.visible = true;
        }

        // フローティングメニューを表示
        function showFloatingMenu(x, y, block, faceType, faceDir) {
            lastMenuX = x;
            lastMenuY = y;

            const menu = document.getElementById('floating-menu');
            menu.innerHTML = ''; 
            menu.style.display = 'flex';
            menu.style.left = (x + 80) + 'px'; 
            menu.style.top = (y + 40) + 'px';

            // --- プッシュプルボタン (黒地に白文字) ---
            const btnExtrude = document.createElement('div');
            btnExtrude.className = 'float-btn black';
            btnExtrude.innerText = '⇧ プッシュプル';
            btnExtrude.onclick = () => { window.setTool('EXTRUDE'); hideFloatingMenu(); };
            menu.appendChild(btnExtrude);

            if (block.h <= 100) return;

            // 【上面をクリックした場合】
            if (faceType === 'top') {
                if (isTopClear(block)) {
                    const btnRoof = document.createElement('div');
                    btnRoof.className = 'float-btn';
                    
                    if (!block.roof) {
                        btnRoof.innerText = '大屋根を追加'; 
                    } else {
                        btnRoof.classList.add('warning'); 
                        if (block.roof.type === '切妻' && !block.roof.params['切妻'].rotate90) btnRoof.innerText = '屋根変更 (→ 切妻90度)';
                        else if (block.roof.type === '切妻' && block.roof.params['切妻'].rotate90) btnRoof.innerText = '屋根変更 (→ 寄棟)';
                        else if (block.roof.type === '寄棟') btnRoof.innerText = '屋根変更 (→ パラペット修景)'; // ★名称変更
                        else if (block.roof.type === 'パラペット修景') btnRoof.innerText = '屋根変更 (→ 陸屋根)'; // ★名称変更
                        else {
                            btnRoof.innerText = '大屋根を削除'; 
                            btnRoof.classList.remove('warning');
                            btnRoof.classList.add('danger');
                        }
                    }
                    btnRoof.onclick = () => { window.toggleRoof(); };
                    menu.appendChild(btnRoof);
                } else {
                    const btnLowerRoof = document.createElement('div');
                    btnLowerRoof.className = 'float-btn';
                    btnLowerRoof.innerText = block.lowerRoof ? '下屋を削除' : '下屋を追加';
                    if (block.lowerRoof) btnLowerRoof.classList.add('danger');
                    btnLowerRoof.onclick = () => { window.toggleLowerRoof(); };
                    menu.appendChild(btnLowerRoof);
                }
            } 
            // 【側面をクリックした場合】
            else if (faceType === 'side') {
                // 1. 庇
                const isVisor = block.visors && block.visors.includes(faceDir);
                const isFlat = block.flatVisors && block.flatVisors.includes(faceDir);
                const btnVisor = document.createElement('div');
                btnVisor.className = 'float-btn';
                if (!isVisor && !isFlat) {
                    btnVisor.innerText = '軒庇・水平庇を追加';
                } else if (isVisor) {
                    btnVisor.innerText = '庇を変更 (→ 水平庇)';
                    btnVisor.classList.add('warning');
                } else {
                    btnVisor.innerText = '庇を削除';
                    btnVisor.classList.add('danger');
                }
                btnVisor.onclick = () => { window.cycleVisor(faceDir); };
                menu.appendChild(btnVisor);

                // 2. バルコニー
                const balcType = block.balconies && block.balconies[faceDir];
                const btnBalcony = document.createElement('div');
                btnBalcony.className = 'float-btn';
                if (!balcType) {
                    btnBalcony.innerText = 'バルコニーを追加';
                } else if (balcType === 'glass') {
                    btnBalcony.innerText = 'バルコニー変更 (→ 縦格子)';
                    btnBalcony.classList.add('warning');
                } else {
                    btnBalcony.innerText = 'バルコニーを削除';
                    btnBalcony.classList.add('danger');
                }
                btnBalcony.onclick = () => { window.toggleBalcony(faceDir); };
                menu.appendChild(btnBalcony);

                // 3. 付け柱・梁
                const hasPillar = block.pilasters && block.pilasters[faceDir];
                const btnPillar = document.createElement('div');
                btnPillar.className = 'float-btn';
                btnPillar.innerText = hasPillar ? '付け柱・付け梁を削除' : '付け柱・付け梁を追加';
                if (hasPillar) btnPillar.classList.add('danger');
                btnPillar.onclick = () => { window.togglePilaster(faceDir); };
                menu.appendChild(btnPillar);

                // 4. 窓 (掃き出し窓から名称変更)
                const hasWindow = block.windows && block.windows[faceDir];
                const btnWindow = document.createElement('div');
                btnWindow.className = 'float-btn';
                btnWindow.innerText = hasWindow ? '窓を削除' : '窓を追加';
                if (hasWindow) btnWindow.classList.add('danger');
                btnWindow.onclick = () => { window.toggleWindow(faceDir); };
                menu.appendChild(btnWindow);

                // 5. 玄関
                if (block.y === 0 || block.y === undefined) {
                    const hasDoor = block.doors && block.doors[faceDir];
                    const btnDoor = document.createElement('div');
                    btnDoor.className = 'float-btn';
                    btnDoor.innerText = hasDoor ? '玄関を削除' : '玄関を追加';
                    if (hasDoor) btnDoor.classList.add('danger');
                    btnDoor.onclick = () => { window.toggleDoor(faceDir); };
                    menu.appendChild(btnDoor);
                }
            }
        }

        /* === window.clearAll などの削除関数にも hideFloatingMenu() を追加 === */

                selectedId = null;
                saveState();
                rebuildMeshes();
                hideFloatingMenu(); // ← 追加

            }
        };

        }

        // HTMLのボタンから呼ばれるツール切り替えラッパー
        window.clickTool = function(toolName) {
            // 同じボタンを押したら解除（null）、違うボタンならそのツールをセット

        // ステータス表示の赤文字を更新する関数

            if (currentTool === 'DRAW') {
                statusText.innerHTML = "▶ 床面をドラッグして平面を作図します<br>▶ 背景クリックでキャンセル";

                statusText.innerHTML = "▶ 面をドラッグして建物をプッシュプルします<br>▶ 面＋Shiftキーで新規ブロックを追加";
            } else if (selectedId !== null) {

                if (!b) return;

                let msgs = ["▶ オブジェクトを選択中 (Deleteキーで削除)"];

                    msgs.push("▶ 面をクリックしてプッシュプルが可能です");
                } else if (isTopClear(b)) {
                    msgs.push("▶ 大屋根の追加・切り替え または 軒庇の追加が可能です");

        window.setTool = function(toolName) {
            currentTool = toolName;

            const btnDraw = document.getElementById('btn-draw');
            const btnExtrude = document.getElementById('btn-extrude');
            const modeText = document.getElementById('mode-text');
            const modeDesc = document.getElementById('mode-desc');

            if (btnDraw && btnExtrude) {
                btnDraw.classList.toggle('active', toolName === 'DRAW');
                btnExtrude.classList.toggle('active', toolName === 'EXTRUDE');
            }

            tooltip.style.display = 'none';
            hoverMesh.visible = false;
            document.body.style.cursor = 'default';           
            if (toolName !== 'EXTRUDE') {
                selectedId = null;
                selectedFaceDir = null;
            }
            rebuildMeshes();

            if (toolName === 'DRAW') {
                modeText.innerText = '【平面作図モード】';
                modeText.style.color = '#d9534f'; 
                modeDesc.innerText = '地面をドラッグして四角形を描いてください (500mmスナップ)';
            } else if (toolName === 'EXTRUDE') {
                modeText.innerText = '【プッシュプルモード】';
                modeText.style.color = '#d9534f'; 
                modeDesc.innerText = '面をドラッグして伸縮 / 任意の面＋Shiftでブロック追加';
            } else {
                modeText.innerText = '【選択・視点移動】';
                modeText.style.color = '#005a9e'; 
                modeDesc.innerText = '左クリック: 面を選択 (Deleteで削除) / 左ドラッグ: 回転 / 右ドラッグ: 平行移動';
            }
            hideFloatingMenu(); 
            updateStatusDisplay(); 
        };

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#floating-menu')) {
                return;
            }

            hideFloatingMenu();
            if (e.button !== 0) return; 
            if (e.target.tagName !== 'CANVAS') return; 

            downPointer.set(e.clientX, e.clientY);

            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);

            if (currentTool === 'DRAW') {
                const pt = getGroundIntersect(e);
                if (!pt) return;
                isDrawing = true;
                drawStartPt.copy(pt);
                controls.enabled = false;

            } else if (currentTool === 'EXTRUDE') {
                const intersects = raycaster.intersectObjects(interactiveMeshes);
                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const hitId = hit.object.userData.id;

                    // ★ 修正：選択していたオブジェクト以外は弾く
                    if (!selectedId || selectedId !== hitId) return;

                    const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
                    
                    // 当たった面の方向を判定
                    let hitFaceDir = null;
                    if (hit.object.userData.isRoof || normal.y > 0.5) hitFaceDir = 'top';
                    else if (normal.y < -0.5) hitFaceDir = 'bottom';
                    else if (normal.z > 0.5) hitFaceDir = 'pz';
                    else if (normal.z < -0.5) hitFaceDir = 'nz';
                    else if (normal.x > 0.5) hitFaceDir = 'px';
                    else if (normal.x < -0.5) hitFaceDir = 'nx';

                    // ★ 修正：選択していた面以外は弾く
                    if (!selectedFaceDir || selectedFaceDir !== hitFaceDir) return;

                    const baseBlock = buildingData.find(d => d.id === hitId);

                    extrudeNormal.set(0,0,0);
                    if (hitFaceDir === 'top') extrudeNormal.set(0,1,0); 
                    else if (hitFaceDir === 'bottom') return; // 底面は押し出し不可
                    else if (hitFaceDir === 'px') extrudeNormal.set(1,0,0); 
                    else if (hitFaceDir === 'nx') extrudeNormal.set(-1,0,0); 
                    else if (hitFaceDir === 'pz') extrudeNormal.set(0,0,1); 
                    else if (hitFaceDir === 'nz') extrudeNormal.set(0,0,-1); 
                    else return;

                    isExtruding = true;
                    connectedBlocks = [];

                    // ★ 修正：押し出す面に応じて「計算に使う見えない面」の向きを切り替える
                    const camDir = camera.getWorldDirection(new THREE.Vector3()).negate();
                    const axis = extrudeNormal.clone();
                    
                    // ドラッグ軸とカメラ方向の両方に直交するベクトル
                    const cross1 = new THREE.Vector3().crossVectors(axis, camDir);
                    // ドラッグ軸を含みつつ、最もカメラを向いている面の法線を算出
                    let planeNormal = new THREE.Vector3().crossVectors(cross1, axis).normalize();
                    
                    // フェールセーフ（視点が完全に軸と平行な場合）
                    if (planeNormal.lengthSq() < 0.001) {
                        planeNormal = axis.y === 0 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
                    }
                    
                    activePlane.setFromNormalAndCoplanarPoint(planeNormal, hit.point);
                    extrudeStartPt.copy(hit.point);

                    if (extrudeNormal.y > 0) {
                        // ※ activePlane と extrudeStartY の記述は上に移動したので削除
                        if (e.shiftKey) {
                            const newY = (baseBlock.y || 0) + baseBlock.h;
                            const newBlock = {
                                id: Date.now().toString(),
                                x: baseBlock.x, y: newY, z: baseBlock.z,
                                w: baseBlock.w, d: baseBlock.d, h: 500 
                            };
                            buildingData.push(newBlock);
                            extrudeTargetId = newBlock.id;
                            connectedBlocks.push({ block: newBlock, startBox: { ...newBlock }, type: 'resize' });
                            
                            rebuildMeshes(); 
                            meshMap[newBlock.id].mesh.material = activeMat;
                        } else {
                            extrudeTargetId = hitId;
                            const stackedBlocks = getStackedBlocks([baseBlock]);
                            
                            stackedBlocks.forEach(ob => {
                                if (ob.id === baseBlock.id) {
                                    connectedBlocks.push({ block: ob, startBox: { ...ob }, type: 'resize' });
                                } else {
                                    connectedBlocks.push({ block: ob, startBox: { ...ob }, type: 'translate' });
                                }
                                meshMap[ob.id].mesh.material = activeMat;
                            });
                        }
                    } 
                    else {
                        if (e.shiftKey) {
                            const newBlock = {
                                id: Date.now().toString(),
                                x: baseBlock.x, y: baseBlock.y || 0, z: baseBlock.z,
                                w: baseBlock.w, d: baseBlock.d, h: baseBlock.h 
                            };
                            if (extrudeNormal.x !== 0) {
                                newBlock.w = 500;
                                newBlock.x = baseBlock.x + (baseBlock.w / 2 + 250) * extrudeNormal.x;
                            } else if (extrudeNormal.z !== 0) {
                                newBlock.d = 500;
                                newBlock.z = baseBlock.z + (baseBlock.d / 2 + 250) * extrudeNormal.z;
                            }
                            buildingData.push(newBlock);
                            extrudeTargetId = newBlock.id;
                            connectedBlocks.push({ block: newBlock, startBox: { ...newBlock }, type: 'resize', normal: extrudeNormal.clone() });
                            
                            rebuildMeshes(); 
                            meshMap[newBlock.id].mesh.material = activeMat;
                        } else {
                            extrudeTargetId = hitId;
                            
                            buildingData.forEach(ob => {
                                if (ob.id === baseBlock.id) return;
                                
                                let isTouchingOpposite = false;
                                if (extrudeNormal.x !== 0) {
                                    const targetEdge = baseBlock.x + (baseBlock.w/2) * extrudeNormal.x;
                                    const obOppositeEdge = ob.x - (ob.w/2) * extrudeNormal.x; 
                                    
                                    if (Math.abs(obOppositeEdge - targetEdge) < 1) { 
                                        const overlapZ = Math.abs(ob.z - baseBlock.z) * 2 < (ob.d + baseBlock.d) - 1;
                                        const overlapY = Math.max((ob.y||0), (baseBlock.y||0)) < Math.min((ob.y||0)+ob.h, (baseBlock.y||0)+baseBlock.h) - 1;
                                        if (overlapZ && overlapY) isTouchingOpposite = true;
                                    }
                                } else if (extrudeNormal.z !== 0) {
                                    const targetEdge = baseBlock.z + (baseBlock.d/2) * extrudeNormal.z;
                                    const obOppositeEdge = ob.z - (ob.d/2) * extrudeNormal.z;
                                    
                                    if (Math.abs(obOppositeEdge - targetEdge) < 1) { 
                                        const overlapX = Math.abs(ob.x - baseBlock.x) * 2 < (ob.w + baseBlock.w) - 1;
                                        const overlapY = Math.max((ob.y||0), (baseBlock.y||0)) < Math.min((ob.y||0)+ob.h, (baseBlock.y||0)+baseBlock.h) - 1;
                                        if (overlapX && overlapY) isTouchingOpposite = true;
                                    }
                                }
                                
                                if (isTouchingOpposite) {
                                    connectedBlocks.push({ block: ob, startBox: { ...ob }, type: 'resize', normal: extrudeNormal.clone().negate() });
                                    meshMap[ob.id].mesh.material = activeMat; 
                                }
                            });
                            connectedBlocks.push({ block: baseBlock, startBox: { ...baseBlock }, type: 'resize', normal: extrudeNormal.clone() });
                            meshMap[extrudeTargetId].mesh.material = activeMat;
                        }
                        
                    }
                    
                    controls.enabled = false;
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDrawing) {
                const pt = getGroundIntersect(e);
                if (!pt) return;

                const w = Math.abs(pt.x - drawStartPt.x);
                const d = Math.abs(pt.z - drawStartPt.z);
                const cx = (pt.x + drawStartPt.x) / 2;
                const cz = (pt.z + drawStartPt.z) / 2;
                const h = 100; 

                if (currentDrawObj) {
                    houseGroup.remove(currentDrawObj.mesh, currentDrawObj.line);
                    currentDrawObj.mesh.geometry.dispose();
                }

                if (w > 0 && d > 0) {
                    const geo = new THREE.BoxGeometry(w, h, d);
                    const mesh = new THREE.Mesh(geo, activeMat);
                    mesh.position.set(cx, h / 2, cz);
                    const line = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
                    line.position.copy(mesh.position);
                    houseGroup.add(mesh, line);
                    currentDrawObj = { mesh, line, x: cx, z: cz, w: w, d: d, h: h };
                    
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                    tooltip.innerText = `間口: ${(w / 1000).toFixed(1)} m\n奥行: ${(d / 1000).toFixed(1)} m`;
                } else {
                    tooltip.style.display = 'none';
                }
                renderer.render(scene, camera);

                } else if (isExtruding) {
                let tooltipText = "";

                // ★ 修正：全方向共通で activePlane (画面平行面) との交点を使って移動量を計算する
                raycaster.setFromCamera(pointer, camera);
                const target = new THREE.Vector3();              
                // ★修正: target オブジェクトは常に true になってしまうため、戻り値(intersect)で判定する
                const intersect = raycaster.ray.intersectPlane(activePlane, target);

                if (intersect) {
                    if (extrudeNormal.y > 0) {
                        const deltaY = target.y - extrudeStartPt.y; // extrudeStartY から変更
                        const mainCb = connectedBlocks.find(cb => cb.type === 'resize');
                        
                        let newH = snap(mainCb.startBox.h + deltaY);
                        if (newH < 500) newH = 500;
                        
                        const actualDeltaY = newH - mainCb.startBox.h;

                        connectedBlocks.forEach(cb => {
                            if (cb.type === 'resize') {
                                cb.block.h = newH;
                            } else if (cb.type === 'translate') {
                                cb.block.y = cb.startBox.y + actualDeltaY;
                            }
                        });
                        tooltipText = `階高: ${(newH / 1000).toFixed(1)} m`;

                    } else if (extrudeNormal.x !== 0) {
                        const deltaX = target.x - extrudeStartPt.x;
                        let validDeltaX = snap(deltaX);
                        let minDeltaX = -Infinity;
                        let maxDeltaX = Infinity;

                        for (let cb of connectedBlocks) {
                            if (cb.type !== 'resize') continue;
                            const startMovingEdge = cb.startBox.x + (cb.startBox.w/2) * cb.normal.x;
                            const fixedEdge = cb.startBox.x - (cb.startBox.w/2) * cb.normal.x;

                            if (cb.normal.x > 0) {
                                const limit = fixedEdge + 500 - startMovingEdge;
                                if (limit > minDeltaX) minDeltaX = limit;
                            } else if (cb.normal.x < 0) {
                                const limit = fixedEdge - 500 - startMovingEdge;
                                if (limit < maxDeltaX) maxDeltaX = limit;
                            }
                        }

                        if (validDeltaX < minDeltaX) validDeltaX = minDeltaX;
                        if (validDeltaX > maxDeltaX) validDeltaX = maxDeltaX;

                        connectedBlocks.forEach(cb => {
                            if (cb.type !== 'resize') return;
                            const startMovingEdge = cb.startBox.x + (cb.startBox.w/2) * cb.normal.x;
                            const fixedEdge = cb.startBox.x - (cb.startBox.w/2) * cb.normal.x;
                            const movingEdge = startMovingEdge + validDeltaX;
                            
                            cb.block.w = Math.abs(movingEdge - fixedEdge);
                            cb.block.x = (movingEdge + fixedEdge) / 2;
                            if (cb.block.id === extrudeTargetId) tooltipText = `間口: ${(cb.block.w / 1000).toFixed(1)} m`;
                        });

                    } else if (extrudeNormal.z !== 0) {
                        const deltaZ = target.z - extrudeStartPt.z;
                        let validDeltaZ = snap(deltaZ);
                        let minDeltaZ = -Infinity;
                        let maxDeltaZ = Infinity;

                        for (let cb of connectedBlocks) {
                            if (cb.type !== 'resize') continue;
                            const startMovingEdge = cb.startBox.z + (cb.startBox.d/2) * cb.normal.z;
                            const fixedEdge = cb.startBox.z - (cb.startBox.d/2) * cb.normal.z;

                            if (cb.normal.z > 0) {
                                const limit = fixedEdge + 500 - startMovingEdge;
                                if (limit > minDeltaZ) minDeltaZ = limit;
                            } else if (cb.normal.z < 0) {
                                const limit = fixedEdge - 500 - startMovingEdge;
                                if (limit < maxDeltaZ) maxDeltaZ = limit;
                            }
                        }

                        if (validDeltaZ < minDeltaZ) validDeltaZ = minDeltaZ;
                        if (validDeltaZ > maxDeltaZ) validDeltaZ = maxDeltaZ;

                        connectedBlocks.forEach(cb => {
                            if (cb.type !== 'resize') return;
                            const startMovingEdge = cb.startBox.z + (cb.startBox.d/2) * cb.normal.z;
                            const fixedEdge = cb.startBox.z - (cb.startBox.d/2) * cb.normal.z;
                            const movingEdge = startMovingEdge + validDeltaZ;
                            
                            cb.block.d = Math.abs(movingEdge - fixedEdge);
                            cb.block.z = (movingEdge + fixedEdge) / 2;
                            if (cb.block.id === extrudeTargetId) tooltipText = `奥行: ${(cb.block.d / 1000).toFixed(1)} m`;
                        });
                    }
                }
                
                // ★ 古い updateAllSkirtRoofs() を updateAllLowerRoofs() に修正
                updateAllLowerRoofs(); 
                rebuildMeshes(); 
                
                const mainB = buildingData.find(d => d.id === extrudeTargetId);
                updateHoverMesh(mainB, extrudeNormal);
                
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.innerText = tooltipText;

            } else if (currentTool === 'EXTRUDE' && !isExtruding) {
                raycaster.setFromCamera(pointer, camera);
                const intersects = raycaster.intersectObjects(interactiveMeshes);
                
                let isHoverValid = false; // ★ ホバー判定フラグ

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const hitId = hit.object.userData.id;
                    
                    // ★ 修正：選択中のオブジェクトかどうか確認
                    if (selectedId && selectedId === hitId) {
                        const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
                        
                        let hitFaceDir = null;
                        if (hit.object.userData.isRoof || normal.y > 0.5) hitFaceDir = 'top';
                        else if (normal.y < -0.5) hitFaceDir = 'bottom';
                        else if (normal.z > 0.5) hitFaceDir = 'pz';
                        else if (normal.z < -0.5) hitFaceDir = 'nz';
                        else if (normal.x > 0.5) hitFaceDir = 'px';
                        else if (normal.x < -0.5) hitFaceDir = 'nx';

                        // ★ 修正：選択中の面かどうか確認
                        if (selectedFaceDir && selectedFaceDir === hitFaceDir) {
                            isHoverValid = true;
                            const b = buildingData.find(d => d.id === hitId);
                            if (b) {
                                let nDir = new THREE.Vector3();
                                if (hitFaceDir === 'top') nDir.set(0,1,0);
                                else if (hitFaceDir === 'bottom') nDir.set(0,-1,0);
                                else if (hitFaceDir === 'px') nDir.set(1,0,0);
                                else if (hitFaceDir === 'nx') nDir.set(-1,0,0);
                                else if (hitFaceDir === 'pz') nDir.set(0,0,1);
                                else if (hitFaceDir === 'nz') nDir.set(0,0,-1);

                                if (nDir.y > 0) {
                                    // ★ 修正：すべての屋根で上面のプッシュプルを許可する
                                    if (b.roof) {
                                        hoverMesh.visible = false; // 屋根の中に黄色い面が埋もれるのを防ぐため非表示
                                    } else {
                                        updateHoverMesh(b, nDir);  // 屋根がない場合は通常通り黄色い面を表示
                                    }
                                    document.body.style.cursor = e.shiftKey ? 'copy' : 'ns-resize'; 
                                } else if (nDir.x !== 0) {
                                    updateHoverMesh(b, nDir);
                                    document.body.style.cursor = e.shiftKey ? 'copy' : 'ew-resize';
                                } else if (nDir.z !== 0) {
                                    updateHoverMesh(b, nDir);
                                    document.body.style.cursor = e.shiftKey ? 'copy' : 'ns-resize'; 
                                }
                            }
                        }
                    }
                }

                // 対象外の面ならホバー状態を消す
                if (!isHoverValid) {
                    hoverMesh.visible = false;
                    document.body.style.cursor = 'default';
                }
                renderer.render(scene, camera);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (currentTool === 'EXTRUDE' && !isExtruding && hoverMesh.visible && e.key === 'Shift') {
                document.body.style.cursor = 'copy'; 
            }
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId !== null) {
                buildingData = buildingData.filter(b => b.id !== selectedId);
                selectedId = null;
                saveState(); 
                rebuildMeshes();
                hideFloatingMenu();    // ★ 追加：削除したらメニューを消す
                updateStatusDisplay(); // ★ 追加：ステータス表示もリセットする
            }
        });

        window.addEventListener('keyup', (e) => {
            if (currentTool === 'EXTRUDE' && !isExtruding && e.key === 'Shift' && hoverMesh.visible) {
                if (hoverMesh.rotation.x === -Math.PI/2) document.body.style.cursor = 'ns-resize'; 
                else if (hoverMesh.rotation.y === Math.PI/2 || hoverMesh.rotation.y === -Math.PI/2) document.body.style.cursor = 'ew-resize';
                else document.body.style.cursor = 'ns-resize';
            }
        });

        window.addEventListener('pointerup', (e) => {
            const upPointer = new THREE.Vector2(e.clientX, e.clientY);
            const isClick = downPointer.distanceTo(upPointer) < 5; // ドラッグ(回転)時は発火させない

            if (isClick && e.target.tagName === 'CANVAS') {
                // ==========================================
                // ① ツールを選択していない（通常の選択）モードの処理
                // ==========================================
                if (currentTool === null) {
                    pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
                    pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(pointer, camera);
                    
                    // ★ 修正：外壁だけでなく、装飾品を含めた「全体」を対象に貫通チェックを行う
                    const intersects = raycaster.intersectObject(houseGroup, true);

                    if (intersects.length > 0) {
                        const hit = intersects[0];
                        // どの装飾品をクリックしても、設定した id から親の建物を特定できる
                        const hitId = hit.object.userData.id;
                        const targetBlock = buildingData.find(d => d.id === hitId);

                        if (targetBlock && targetBlock.h >= 100) {
                            selectedId = hitId;
                            
                            let faceType = null;
                            let faceDir = null;
                            let clickedDecoType = null;

                            // どこをクリックしたか（屋根か、装飾品か、ただの壁か）を判定
                            if (hit.object.userData.isRoof) {
                                faceType = 'top';
                                selectedFaceDir = 'top';
                            } else if (hit.object.userData.isDeco) {
                                clickedDecoType = hit.object.userData.type; 
                                
                                // ★ 修正：下屋をクリックした場合は、壁(side)ではなく「上面(top)」扱いにする
                                if (clickedDecoType === 'lowerRoof') {
                                    faceType = 'top';
                                    selectedFaceDir = 'top';
                                } else {
                                    faceType = 'side';
                                    faceDir = hit.object.userData.dir;
                                    
                                    // 庇などのように dir が明示されていない場合は、クリックした位置から所属する面を判定
                                    if (!faceDir && hit.point) {
                                        const dx = hit.point.x - targetBlock.x;
                                        const dz = hit.point.z - targetBlock.z;
                                        if (Math.abs(dz) / targetBlock.d > Math.abs(dx) / targetBlock.w) {
                                            faceDir = dz > 0 ? 'pz' : 'nz';
                                        } else {
                                            faceDir = dx > 0 ? 'px' : 'nx';
                                        }
                                    }
                                    selectedFaceDir = faceDir;
                                }
                            } else {
                                // ただの壁をクリックした場合
                                const normal = hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
                                if (normal.y > 0.5) { faceType = 'top'; selectedFaceDir = 'top'; }
                                else if (normal.y < -0.5) { faceType = 'bottom'; selectedFaceDir = 'bottom'; }
                                else {
                                    faceType = 'side';
                                    if (normal.z > 0.5) faceDir = 'pz';
                                    else if (normal.z < -0.5) faceDir = 'nz';
                                    else if (normal.x > 0.5) faceDir = 'px';
                                    else if (normal.x < -0.5) faceDir = 'nx';
                                    selectedFaceDir = faceDir;
                                }
                            }

                            showFloatingMenu(e.clientX, e.clientY, targetBlock, faceType, faceDir);

                            // GUIの表示分岐
                            if (faceType === 'top') {
                                if (targetBlock.roof) updateGUI(targetBlock, 'roof');
                                else if (targetBlock.lowerRoof) updateGUI(targetBlock, 'lowerRoof');
                                else clearGUI();
                            } else if (faceType === 'side') {
                                // 装飾品を直接クリックした場合は、その専用GUIを開く
                                if (clickedDecoType) {
                                    updateGUI(targetBlock, clickedDecoType, faceDir);
                                } 
                                // ただの壁をクリックした場合は、設置されているものを優先して開く
                                else if (targetBlock.balconies && targetBlock.balconies[faceDir]) {
                                    updateGUI(targetBlock, 'balcony', faceDir);
                                } else if (targetBlock.pilasters && targetBlock.pilasters[faceDir]) { 
                                    updateGUI(targetBlock, 'pilaster', faceDir);
                                } else if (targetBlock.windows && targetBlock.windows[faceDir]) {
                                    updateGUI(targetBlock, 'window', faceDir);
                                } else if (targetBlock.doors && targetBlock.doors[faceDir]) {
                                    updateGUI(targetBlock, 'door', faceDir);
                                } else {
                                    updateGUI(targetBlock, 'side', faceDir);
                                }
                            } else {
                                clearGUI();
                            }
                        } else {
                            // ブロックが見つからない、または薄すぎる（床面）場合
                            selectedId = null; selectedFaceDir = null; hideFloatingMenu(); clearGUI(); 
                        }
                    } else {
                        // 何もヒットしなかった場合（背景をクリック）
                        selectedId = null; selectedFaceDir = null; hideFloatingMenu(); clearGUI(); 
                    }
                    
                    rebuildMeshes();
                    updateStatusDisplay();
                }
                // ==========================================
                // ② ツール選択中（作図・プッシュプル）の処理
                // ==========================================
                else {
                    // ドラッグ（作図中・押し出し中）でなければ、空振りクリックとみなしてキャンセル
                    if (!isDrawing && !isExtruding) {
                        window.setTool(null); 
                    }
                }
            }

            // --- 平面作図の完了処理 ---
            if (isDrawing) {
                isDrawing = false;
                controls.enabled = true;
                tooltip.style.display = 'none'; 
                
                if (currentDrawObj && currentDrawObj.w > 0 && currentDrawObj.d > 0) {
                    buildingData.push({
                        id: Date.now().toString(),
                        x: currentDrawObj.x,
                        y: 0, 
                        z: currentDrawObj.z,
                        w: currentDrawObj.w,
                        d: currentDrawObj.d,
                        h: currentDrawObj.h
                    });
                    saveState(); 
                }
                currentDrawObj = null;
                rebuildMeshes();
                window.setTool(null); 
            }

            // --- プッシュプルの完了処理 ---
            if (isExtruding) {
                isExtruding = false;
                controls.enabled = true;
                tooltip.style.display = 'none'; 
                hoverMesh.visible = false;   
                document.body.style.cursor = 'default';

                extrudeTargetId = null;
                connectedBlocks = [];
                saveState(); 
                rebuildMeshes();
                window.setTool(null); 

                // ★追加：もし現在、つけ柱やバルコニーの調整パネルが開いていれば、本数変更を反映するためにGUIを更新する
                if (currentGUI && selectedId) {
                    const b = buildingData.find(d => d.id === selectedId);
                    // 現在開いているGUIのタイトルを確認して、該当すれば作り直す
                    if (currentGUI._title.includes('つけ柱')) {
                        updateGUI(b, 'pilaster', selectedFaceDir);
                    } else if (currentGUI._title.includes('バルコニー')) {
                        updateGUI(b, 'balcony', selectedFaceDir);
                    }
                }
            }
        });        
        controls.addEventListener('change', () => renderer.render(scene, camera));
        renderer.render(scene, camera); 

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.render(scene, camera);
        });
        window.clearAll = function() {
            if(confirm('すべてのオブジェクトを消去しますか？')) {
                buildingData = [];
                selectedId = null;
                saveState();
                rebuildMeshes();
                hideFloatingMenu();    // ★ 追加：全消去したらメニューを消す
                updateStatusDisplay(); // ★ 追加：ステータス表示もリセットする
            }
        };
        // 戻る・進むのグローバル化（HTMLから直接呼べるようにする）
        window.undo = undo;
        window.redo = redo;
    </script>
</body>
</html>
