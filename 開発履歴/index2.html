<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景観規制_建物シミュレーター</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-family: sans-serif;
            pointer-events: none;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        .lil-gui {
            --font-size: 14px;
            --input-font-size: 14px;
            --widget-height: 26px;
            --name-width: 55%;
            --folder-indent: 10px;
        }

        .toggle-container {
            display: flex;
            flex: 1;
            gap: 4px;
            box-sizing: border-box;
        }
        .toggle-btn {
            flex: 1;
            text-align: center;
            background: #3a3a3a;
            color: #ccc;
            padding: 3px 0;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            border: 1px solid #222;
            transition: all 0.2s ease;
            user-select: none;
        }
        .toggle-btn:hover {
            background: #4a4a4a;
            color: #fff;
        }
        .toggle-btn.active {
            background: #007acc;
            color: #ffffff;
            border-color: #005a9e;
            font-weight: bold;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="info">左クリック: 回転 / 右クリック: 平行移動 / ホイール: ズーム (1マス=1m)</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        const width = window.innerWidth;
        const height = window.innerHeight;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);

        const camera = new THREE.PerspectiveCamera(45, width / height, 100, 50000);
        camera.position.set(12000, 10000, 15000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3000, 0);
        controls.update(); 
        controls.addEventListener('change', render);

        const gridHelper = new THREE.GridHelper(20000, 20, 0xcccccc, 0xe0e0e0);
        scene.add(gridHelper);

        function munsellToHSL(munsellStr) {
            const str = munsellStr.trim();
            const nMatch = str.match(/^N\s*([\d.]+)$/i);
            if (nMatch) {
                return { h: 0, s: 0, l: parseFloat(nMatch[1]) * 10 };
            }

            const match = str.match(/^([\d.]+)\s*([a-zA-Z]+)\s+([\d.]+)\s*\/\s*([\d.]+)$/i);
            if (!match) return null;

            const hNum = parseFloat(match[1]);
            const hName = match[2].toUpperCase();
            const v = parseFloat(match[3]);
            const c = parseFloat(match[4]);

            const hueMap = {
                'R': 0, 'YR': 36, 'Y': 72, 'GY': 108, 'G': 144,
                'BG': 180, 'B': 216, 'PB': 252, 'P': 288, 'RP': 324
            };

            if (hueMap[hName] === undefined) return null;

            let hue = hueMap[hName] + (hNum - 5) * 3.6;
            hue = (hue % 360 + 360) % 360;
            const lightness = v * 10;
            let saturation = (c / 14) * 100;
            if (saturation > 100) saturation = 100;

            return { h: hue, s: saturation, l: lightness };
        }

        const params = {
            baseWidth: 5460,
            baseDepth: 7280,
            floorHeight: 3000,
            roofType: '切妻',
            rotateRoof90: false, 
            eavesOut: 600,
            kerabaOut: 300,
            roofSlope: 4,
            roofThick: 150,
            showEntEaves: false,
            entEavesOut: 600,
            entEavesSideOut: 300,
            wallMunsell: '2Y 8/1',
            roofMunsell: 'N 2'
        };

        const wallMat = new THREE.MeshBasicMaterial();
        const roofMat = new THREE.MeshBasicMaterial();
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

        let houseGroup = new THREE.Group();
        scene.add(houseGroup);

        const infoDiv = document.getElementById('info');

        function render() {
            renderer.render(scene, camera);
        }

        function updateColors() {
            let errorMsg = '';
            const wallHSL = munsellToHSL(params.wallMunsell);
            if (wallHSL) {
                wallMat.color.setHSL(wallHSL.h / 360, wallHSL.s / 100, wallHSL.l / 100);
            } else {
                errorMsg += '壁のマンセル値が不正です。 ';
            }
            
            const roofHSL = munsellToHSL(params.roofMunsell);
            if (roofHSL) {
                roofMat.color.setHSL(roofHSL.h / 360, roofHSL.s / 100, roofHSL.l / 100);
            } else {
                errorMsg += '屋根のマンセル値が不正です。';
            }

            if (errorMsg) {
                infoDiv.innerHTML = `<span style="color:red; font-weight:bold;">${errorMsg}</span>`;
            } else {
                infoDiv.innerHTML = `左クリック: 回転 / 右クリック: 平行移動 / ホイール: ズーム (1マス=1m)`;
            }
            render();
        }

        function updateHouse() {
            while(houseGroup.children.length > 0){ 
                const child = houseGroup.children[0];
                houseGroup.remove(child); 
                if(child.geometry) child.geometry.dispose();
            }

            const w = params.baseWidth;
            const d = params.baseDepth;
            const fh = params.floorHeight;
            const wallH = fh * 2;
            const slope = params.roofSlope / 10;
            const t = params.roofThick;

            // ==========================================
            // 1. 建物本体と大屋根の描画
            // ==========================================
            if (params.roofType === '切妻') {
                const isRotated = params.rotateRoof90;
                const profW = isRotated ? d : w;
                const extD = isRotated ? w : d;
                const ridgeH = (profW / 2) * slope;

                const wallShape = new THREE.Shape();
                wallShape.moveTo(-profW/2, 0);
                wallShape.lineTo(profW/2, 0);
                wallShape.lineTo(profW/2, wallH);
                wallShape.lineTo(0, wallH + ridgeH);
                wallShape.lineTo(-profW/2, wallH);
                wallShape.lineTo(-profW/2, 0);

                const wallGeo = new THREE.ExtrudeGeometry(wallShape, { depth: extD, bevelEnabled: false });
                const wallMesh = new THREE.Mesh(wallGeo, wallMat);
                const wallEdges = new THREE.EdgesGeometry(wallGeo);
                const wallLine = new THREE.LineSegments(wallEdges, edgeMat);

                if (isRotated) {
                    wallMesh.rotation.y = wallLine.rotation.y = Math.PI / 2;
                    wallMesh.position.set(-extD / 2, 0, 0);
                    wallLine.position.set(-extD / 2, 0, 0);
                } else {
                    wallMesh.position.set(0, 0, -extD / 2);
                    wallLine.position.set(0, 0, -extD / 2);
                }
                houseGroup.add(wallMesh, wallLine);

                const e = params.eavesOut;
                const drop = e * slope;
                const roofShape = new THREE.Shape();
                roofShape.moveTo(-profW/2 - e, wallH - drop + t);
                roofShape.lineTo(0, wallH + ridgeH + t);
                roofShape.lineTo(profW/2 + e, wallH - drop + t);
                roofShape.lineTo(profW/2 + e, wallH - drop);
                roofShape.lineTo(0, wallH + ridgeH);
                roofShape.lineTo(-profW/2 - e, wallH - drop);
                roofShape.lineTo(-profW/2 - e, wallH - drop + t);

                const roofD = extD + (params.kerabaOut * 2);
                const roofGeo = new THREE.ExtrudeGeometry(roofShape, { depth: roofD, bevelEnabled: false });
                const roofMesh = new THREE.Mesh(roofGeo, roofMat);
                const roofEdges = new THREE.EdgesGeometry(roofGeo);
                const roofLine = new THREE.LineSegments(roofEdges, edgeMat);

                if (isRotated) {
                    roofMesh.rotation.y = roofLine.rotation.y = Math.PI / 2;
                    roofMesh.position.set(-roofD / 2, 0, 0);
                    roofLine.position.set(-roofD / 2, 0, 0);
                } else {
                    roofMesh.position.set(0, 0, -roofD / 2);
                    roofLine.position.set(0, 0, -roofD / 2);
                }
                houseGroup.add(roofMesh, roofLine);

            } else {
                // ==========================================
                // 寄棟屋根 (Hipped Roof)
                // ==========================================
                const wallGeo = new THREE.BoxGeometry(w, wallH, d);
                const wallMesh = new THREE.Mesh(wallGeo, wallMat);
                wallMesh.position.y = wallH / 2;
                houseGroup.add(wallMesh);
                const wallLine = new THREE.LineSegments(new THREE.EdgesGeometry(wallGeo), edgeMat);
                wallLine.position.y = wallH / 2;
                houseGroup.add(wallLine);

                const re = params.eavesOut;
                const rk = params.kerabaOut;
                const S_z = slope;
                const drop = re * S_z;
                
                const safe_rk = Math.max(0.001, rk); 
                const S_x = drop / safe_rk;
                
                const H_z_max = (d / 2) * S_z;
                const H_x_max = (w / 2) * S_x;
                
                let ridge_axis = 'Z';
                let H_ridge_rel = 0;
                let rZ = 0, rX = 0;
                
                if (H_x_max <= H_z_max) {
                    ridge_axis = 'Z';
                    H_ridge_rel = H_x_max;
                    rZ = d / 2 - (w / 2) * (re / safe_rk);
                } else {
                    ridge_axis = 'X';
                    H_ridge_rel = H_z_max;
                    rX = w / 2 - (d / 2) * (safe_rk / re);
                }
                
                const ry_top = wallH + H_ridge_rel + t;
                const ey_top = wallH - drop + t;
                const ey_bot = wallH - drop;
                const ex = w / 2 + rk;
                const ez = d / 2 + re;
                
                const p_ridge_1 = (ridge_axis === 'Z') ? [0, ry_top, rZ] : [rX, ry_top, 0];
                const p_ridge_2 = (ridge_axis === 'Z') ? [0, ry_top, -rZ] : [-rX, ry_top, 0];
                
                const ry_bot = wallH + H_ridge_rel;
                const p_ridge_bot_1 = (ridge_axis === 'Z') ? [0, ry_bot, rZ] : [rX, ry_bot, 0];
                const p_ridge_bot_2 = (ridge_axis === 'Z') ? [0, ry_bot, -rZ] : [-rX, ry_bot, 0];
                
                const vertices = new Float32Array([
                    // Top
                    p_ridge_1[0], ry_top, p_ridge_1[2], // 0
                    p_ridge_2[0], ry_top, p_ridge_2[2], // 1
                     ex, ey_top,  ez,                   // 2 (Front-Right)
                    -ex, ey_top,  ez,                   // 3 (Front-Left)
                     ex, ey_top, -ez,                   // 4 (Back-Right)
                    -ex, ey_top, -ez,                   // 5 (Back-Left)
                    // Bottom
                    p_ridge_bot_1[0], ry_bot, p_ridge_bot_1[2], // 6
                    p_ridge_bot_2[0], ry_bot, p_ridge_bot_2[2], // 7
                     ex, ey_bot,  ez,                       // 8
                    -ex, ey_bot,  ez,                       // 9
                     ex, ey_bot, -ez,                       // 10
                    -ex, ey_bot, -ez                        // 11
                ]);

                const indices = [];
                const addTri = (a, b, c) => indices.push(a, b, c);
                const addQuad = (a, b, c, d) => indices.push(a, b, c, a, c, d);

                // ★ バグ修正: 反時計回り(CCW)に厳密に統一し、裏面が透けないようにする ★
                if (ridge_axis === 'Z') {
                    // Top faces
                    addTri(0, 3, 2); 
                    addTri(1, 4, 5); 
                    addQuad(0, 2, 4, 1); 
                    addQuad(0, 1, 5, 3); 
                    // Bottom faces (Soffit)
                    addTri(6, 8, 9); 
                    addTri(7, 11, 10); 
                    addQuad(6, 7, 10, 8); 
                    addQuad(6, 9, 11, 7); 
                } else {
                    // Top faces
                    addTri(0, 2, 4); 
                    addTri(1, 5, 3); 
                    addQuad(0, 1, 3, 2); 
                    addQuad(0, 4, 5, 1); 
                    // Bottom faces
                    addTri(6, 10, 8); 
                    addTri(7, 9, 11); 
                    addQuad(6, 8, 9, 7); 
                    addQuad(6, 7, 11, 10); 
                }

                // Fascia (破風・鼻隠し)
                addQuad(2, 3, 9, 8); 
                addQuad(4, 10, 11, 5); 
                addQuad(2, 8, 10, 4); 
                addQuad(3, 5, 11, 9); 

                const roofGeo = new THREE.BufferGeometry();
                roofGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                roofGeo.setIndex(indices);
                roofGeo.computeVertexNormals();
                
                const roofMesh = new THREE.Mesh(roofGeo, roofMat);
                const roofLine = new THREE.LineSegments(new THREE.EdgesGeometry(roofGeo), edgeMat);
                houseGroup.add(roofMesh, roofLine);
            }

            // ==========================================
            // 2. 軒庇の描画（出隅の回り込み・コの字）
            // ==========================================
            if (params.showEntEaves) {
                const eeD = params.entEavesOut;
                const eeT = t; 
                const drop = eeD * slope; 
                const k = params.entEavesSideOut;

                const x0 = -w/2 - k;
                const x1 = -w/2;    
                const x2 = w/2;     
                const x3 = w/2 + k; 

                const zF = d/2 + eeD;
                const zR = d/2;      
                const zB = d/2 - 300; 

                const yR_top = fh + eeT;
                const yF_top = fh + eeT - drop;
                const yB_top = fh + eeT - 300 * slope;
                
                const yR_bot = fh;
                const yF_bot = fh - drop;
                const yB_bot = fh - 300 * slope;

                const eeVertices = new Float32Array([
                    x0, yF_top, zF,  x1, yF_top, zF,  x2, yF_top, zF,  x3, yF_top, zF,
                    x0, yR_top, zR,  x1, yR_top, zR,  x2, yR_top, zR,  x3, yR_top, zR,
                    x0, yB_top, zB,  x1, yB_top, zB,  x2, yB_top, zB,  x3, yB_top, zB,
                    x0, yF_bot, zF,  x1, yF_bot, zF,  x2, yF_bot, zF,  x3, yF_bot, zF,
                    x0, yR_bot, zR,  x1, yR_bot, zR,  x2, yR_bot, zR,  x3, yR_bot, zR,
                    x0, yB_bot, zB,  x1, yB_bot, zB,  x2, yB_bot, zB,  x3, yB_bot, zB 
                ]);

                const eeIndices = [];
                const addQ = (a, b, c, d) => eeIndices.push(a, b, c, a, c, d);

                addQ(0, 1, 5, 4); addQ(1, 2, 6, 5); addQ(2, 3, 7, 6); 
                if (k > 0) { 
                    addQ(4, 5, 9, 8); 
                    addQ(6, 7, 11, 10); 
                }

                addQ(12, 16, 17, 13); addQ(13, 17, 18, 14); addQ(14, 18, 19, 15);
                if (k > 0) { 
                    addQ(16, 20, 21, 17);
                    addQ(18, 22, 23, 19);
                }

                addQ(12, 13, 1, 0); addQ(13, 14, 2, 1); addQ(14, 15, 3, 2);

                addQ(0, 4, 16, 12); 
                addQ(3, 15, 19, 7); 
                if (k > 0) {
                    addQ(4, 8, 20, 16); 
                    addQ(7, 19, 23, 11); 
                    addQ(8, 9, 21, 20); 
                    addQ(10, 11, 23, 22); 
                    addQ(9, 5, 17, 21); 
                    addQ(6, 10, 22, 18); 
                }

                addQ(5, 6, 18, 17);

                const eeGeo = new THREE.BufferGeometry();
                eeGeo.setAttribute('position', new THREE.BufferAttribute(eeVertices, 3));
                eeGeo.setIndex(eeIndices);
                eeGeo.computeVertexNormals();

                const eeMesh = new THREE.Mesh(eeGeo, roofMat);
                houseGroup.add(eeMesh);

                const eeLine = new THREE.LineSegments(new THREE.EdgesGeometry(eeGeo), edgeMat);
                houseGroup.add(eeLine);
            }

            // 3. 水平基準線
            const rectGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, 0, d));
            const line1F = new THREE.LineSegments(rectGeo, edgeMat);
            line1F.position.y = fh;
            houseGroup.add(line1F);
            const line2F = new THREE.LineSegments(rectGeo, edgeMat);
            line2F.position.y = wallH;
            houseGroup.add(line2F);

            render();
        }

        updateColors();
        updateHouse();

        function makeToggleButton(controller, options) {
            const widget = controller.domElement.querySelector('.widget');
            if (widget) widget.style.display = 'none'; 

            const container = document.createElement('div');
            container.className = 'toggle-container';

            const blockEvent = (e) => e.stopPropagation();
            container.addEventListener('mousedown', blockEvent);
            container.addEventListener('touchstart', blockEvent);
            container.addEventListener('pointerdown', blockEvent);
            container.addEventListener('click', blockEvent);

            const btns = [];
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'toggle-btn';
                if (controller.getValue() === opt.value) {
                    btn.classList.add('active');
                }
                btn.innerText = opt.label;
                
                btn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation(); 
                    
                    controller.setValue(opt.value);
                    
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                
                container.appendChild(btn);
                btns.push(btn);
            });

            controller.domElement.appendChild(container);
        }

        const gui = new GUI({ title: '景観規制_建物シミュレーター', width: 360 });
        
        // --- 建物寸法 ---
        const guiSize = gui.addFolder('建物寸法 (mm)');
        guiSize.add(params, 'baseWidth', 3000, 10000, 10).name('建物幅').onChange(updateHouse);
        guiSize.add(params, 'baseDepth', 3000, 10000, 10).name('建物奥行').onChange(updateHouse);
        guiSize.add(params, 'floorHeight', 2000, 4000, 10).name('階高').onChange(updateHouse);
        
        // --- 大屋根 ---
        const guiRoof = gui.addFolder('大屋根');
        
        const ctrlRoofType = guiRoof.add(params, 'roofType', ['切妻', '寄棟']).name('屋根形状').onChange((val) => {
            if (val === '寄棟') {
                // ★ 寄棟にした瞬間、ケラバの出を軒の出に合わせ、UIを無効化（半透明）にする ★
                params.kerabaOut = params.eavesOut;
                ctrlKerabaOut.updateDisplay();
                ctrlKerabaOut.domElement.style.pointerEvents = 'none';
                ctrlKerabaOut.domElement.style.opacity = '0.5';
            } else {
                // 切妻に戻したら有効化
                ctrlKerabaOut.domElement.style.pointerEvents = 'auto';
                ctrlKerabaOut.domElement.style.opacity = '1.0';
            }
            updateHouse();
        });
        makeToggleButton(ctrlRoofType, [
            { label: '切妻', value: '切妻' },
            { label: '寄棟', value: '寄棟' }
        ]);

        const ctrlRotate = guiRoof.add(params, 'rotateRoof90').name('切妻90度回転').onChange(updateHouse);
        makeToggleButton(ctrlRotate, [
            { label: 'OFF', value: false },
            { label: 'ON', value: true }
        ]);

        const ctrlEavesOut = guiRoof.add(params, 'eavesOut', 0, 1500, 10).name('軒の出 (mm)').onChange(() => {
            if (params.roofType === '寄棟') {
                // ★ 寄棟の時は、軒の出を変えるとケラバの出も自動連動する ★
                params.kerabaOut = params.eavesOut;
                ctrlKerabaOut.updateDisplay();
            }
            updateHouse();
        });
        
        const ctrlKerabaOut = guiRoof.add(params, 'kerabaOut', 0, 1500, 10).name('けらばの出 (mm)').onChange(updateHouse);
        guiRoof.add(params, 'roofSlope', 0.5, 10, 0.5).name('屋根勾配 (寸)').onChange(updateHouse);
        guiRoof.add(params, 'roofThick', 50, 500, 10).name('屋根厚 (mm)').onChange(updateHouse);

        // --- 軒庇 ---
        const guiEnt = gui.addFolder('軒庇');
        
        const ctrlEaves = guiEnt.add(params, 'showEntEaves').name('軒庇を表示').onChange(updateHouse);
        makeToggleButton(ctrlEaves, [
            { label: 'OFF', value: false },
            { label: 'ON', value: true }
        ]);

        guiEnt.add(params, 'entEavesOut', 0, 1500, 10).name('軒庇の出(mm)').onChange(updateHouse);
        guiEnt.add(params, 'entEavesSideOut', 0, 1000, 10).name('軒庇のけらば(mm)').onChange(updateHouse);

        // --- 色指定 ---
        const guiColor = gui.addFolder('色指定 (マンセル値)');
        guiColor.add(params, 'wallMunsell').name('壁').onFinishChange(updateColors);
        guiColor.add(params, 'roofMunsell').name('屋根').onFinishChange(updateColors);
        
        const hintBtn = { hint: () => alert('【入力例】\n・有彩色: 5Y 8/2、10YR 7.5/1.5 など\n・無彩色: N 3、N 8.5 など\n\n※確定にはEnterキーを押すか、別の場所をクリックしてください。') };
        guiColor.add(hintBtn, 'hint').name('入力のヒントを表示');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        });
    </script>
</body>
</html>
