<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>景観規制_建物シミュレーター</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-family: sans-serif;
            pointer-events: none;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        /* 操作パネル (lil-gui) の文字サイズ調整 */
        .lil-gui {
            --font-size: 14px;
            --input-font-size: 14px;
            --widget-height: 26px;
            --name-width: 55%;
            --folder-indent: 10px;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="info">左クリック: 回転 / 右クリック: 平行移動 / ホイール: ズーム (1マス=1m)</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        const width = window.innerWidth;
        const height = window.innerHeight;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf5f5f5);

        const camera = new THREE.PerspectiveCamera(45, width / height, 100, 50000);
        camera.position.set(12000, 10000, 15000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        // カメラの注視点を建物の高さ方向の中心付近(Y=3000)に設定
        controls.target.set(0, 3000, 0); 
        // 【修正点】ターゲット設定後、初回描画前にカメラの向きを更新してジャンプを防ぐ
        controls.update(); 
        controls.addEventListener('change', render);

        // 1マス=1000mm(1m)のグリッド
        const gridHelper = new THREE.GridHelper(20000, 20, 0xcccccc, 0xe0e0e0);
        scene.add(gridHelper);

        function munsellToHSL(munsellStr) {
            const str = munsellStr.trim();
            const nMatch = str.match(/^N\s*([\d.]+)$/i);
            if (nMatch) {
                return { h: 0, s: 0, l: parseFloat(nMatch[1]) * 10 };
            }

            const match = str.match(/^([\d.]+)\s*([a-zA-Z]+)\s+([\d.]+)\s*\/\s*([\d.]+)$/i);
            if (!match) return null;

            const hNum = parseFloat(match[1]);
            const hName = match[2].toUpperCase();
            const v = parseFloat(match[3]);
            const c = parseFloat(match[4]);

            const hueMap = {
                'R': 0, 'YR': 36, 'Y': 72, 'GY': 108, 'G': 144,
                'BG': 180, 'B': 216, 'PB': 252, 'P': 288, 'RP': 324
            };

            if (hueMap[hName] === undefined) return null;

            let hue = hueMap[hName] + (hNum - 5) * 3.6;
            hue = (hue % 360 + 360) % 360;
            const lightness = v * 10;
            let saturation = (c / 14) * 100;
            if (saturation > 100) saturation = 100;

            return { h: hue, s: saturation, l: lightness };
        }

        const params = {
            baseWidth: 5460,
            baseDepth: 7280,
            floorHeight: 3000,
            eavesOut: 600,
            kerabaOut: 300,
            roofSlope: 4,
            roofThick: 150,
            wallMunsell: '2Y 8/1',
            roofMunsell: 'N 2'
        };

        const wallMat = new THREE.MeshBasicMaterial();
        const roofMat = new THREE.MeshBasicMaterial();
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });

        let houseGroup = new THREE.Group();
        scene.add(houseGroup);

        const infoDiv = document.getElementById('info');

        function render() {
            renderer.render(scene, camera);
        }

        function updateColors() {
            let errorMsg = '';
            const wallHSL = munsellToHSL(params.wallMunsell);
            if (wallHSL) {
                wallMat.color.setHSL(wallHSL.h / 360, wallHSL.s / 100, wallHSL.l / 100);
            } else {
                errorMsg += '壁のマンセル値が不正です。 ';
            }
            
            const roofHSL = munsellToHSL(params.roofMunsell);
            if (roofHSL) {
                roofMat.color.setHSL(roofHSL.h / 360, roofHSL.s / 100, roofHSL.l / 100);
            } else {
                errorMsg += '屋根のマンセル値が不正です。';
            }

            if (errorMsg) {
                infoDiv.innerHTML = `<span style="color:red; font-weight:bold;">${errorMsg}</span>`;
            } else {
                infoDiv.innerHTML = `左クリック: 回転 / 右クリック: 平行移動 / ホイール: ズーム (1マス=1m)`;
            }
            render();
        }

        function updateHouse() {
            while(houseGroup.children.length > 0){ 
                const child = houseGroup.children[0];
                houseGroup.remove(child); 
                if(child.geometry) child.geometry.dispose();
            }

            const w = params.baseWidth;
            const d = params.baseDepth;
            const fh = params.floorHeight;
            const wallH = fh * 2;
            const slope = params.roofSlope / 10;
            const ridgeH = (w / 2) * slope;

            const wallShape = new THREE.Shape();
            wallShape.moveTo(-w/2, 0);
            wallShape.lineTo(w/2, 0);
            wallShape.lineTo(w/2, wallH);
            wallShape.lineTo(0, wallH + ridgeH);
            wallShape.lineTo(-w/2, wallH);
            wallShape.lineTo(-w/2, 0);

            const wallGeo = new THREE.ExtrudeGeometry(wallShape, { depth: d, bevelEnabled: false });
            const wallMesh = new THREE.Mesh(wallGeo, wallMat);
            wallMesh.position.z = -d / 2;
            houseGroup.add(wallMesh);

            const wallEdges = new THREE.EdgesGeometry(wallGeo);
            const wallLine = new THREE.LineSegments(wallEdges, edgeMat);
            wallLine.position.z = -d / 2;
            houseGroup.add(wallLine);

            const e = params.eavesOut;
            const drop = e * slope;
            const t = params.roofThick;
            
            const roofShape = new THREE.Shape();
            roofShape.moveTo(-w/2 - e, wallH - drop + t);
            roofShape.lineTo(0, wallH + ridgeH + t);
            roofShape.lineTo(w/2 + e, wallH - drop + t);
            roofShape.lineTo(w/2 + e, wallH - drop);
            roofShape.lineTo(0, wallH + ridgeH);
            roofShape.lineTo(-w/2 - e, wallH - drop);
            roofShape.lineTo(-w/2 - e, wallH - drop + t);

            const roofD = d + (params.kerabaOut * 2);
            const roofGeo = new THREE.ExtrudeGeometry(roofShape, { depth: roofD, bevelEnabled: false });
            const roofMesh = new THREE.Mesh(roofGeo, roofMat);
            roofMesh.position.z = -roofD / 2;
            houseGroup.add(roofMesh);

            const roofEdges = new THREE.EdgesGeometry(roofGeo);
            const roofLine = new THREE.LineSegments(roofEdges, edgeMat);
            roofLine.position.z = -roofD / 2;
            houseGroup.add(roofLine);

            const rectGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, 0, d));
            const line1F = new THREE.LineSegments(rectGeo, edgeMat);
            line1F.position.y = fh;
            houseGroup.add(line1F);
            const line2F = new THREE.LineSegments(rectGeo, edgeMat);
            line2F.position.y = wallH;
            houseGroup.add(line2F);

            render();
        }

        updateColors();
        updateHouse();

        const gui = new GUI({ title: '景観規制_建物シミュレーター', width: 360 });
        
        const guiSize = gui.addFolder('基本サイズ (mm)');
        guiSize.add(params, 'baseWidth', 3000, 10000, 10).name('建物の幅(妻側)').onChange(updateHouse);
        guiSize.add(params, 'baseDepth', 3000, 10000, 10).name('建物の奥行(平側)').onChange(updateHouse);
        
        const guiDetail = gui.addFolder('屋根・階高');
        guiDetail.add(params, 'floorHeight', 2000, 4000, 10).name('階高 (mm)').onChange(updateHouse);
        guiDetail.add(params, 'eavesOut', 0, 1500, 10).name('軒の出 (mm)').onChange(updateHouse);
        guiDetail.add(params, 'kerabaOut', 0, 600, 10).name('けらばの出 (mm)').onChange(updateHouse);
        guiDetail.add(params, 'roofSlope', 0.5, 10, 0.5).name('屋根勾配 (寸)').onChange(updateHouse);
        guiDetail.add(params, 'roofThick', 50, 500, 10).name('屋根厚 (mm)').onChange(updateHouse);

        const guiColor = gui.addFolder('色指定 (マンセル値)');
        guiColor.add(params, 'wallMunsell').name('壁').onFinishChange(updateColors);
        guiColor.add(params, 'roofMunsell').name('屋根').onFinishChange(updateColors);
        
        const hintBtn = { hint: () => alert('【入力例】\n・有彩色: 5Y 8/2、10YR 7.5/1.5 など（色相 明度/彩度）\n・無彩色: N 3、N 8.5 など（N 明度）\n\n※確定にはEnterキーを押すか、別の場所をクリックしてください。') };
        guiColor.add(hintBtn, 'hint').name('入力のヒントを表示');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        });
    </script>
</body>
</html>
